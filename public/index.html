<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeLite - Nonton Santai</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans flex flex-col items-center min-h-screen p-4">

    <div class="w-full max-w-3xl mt-10 mb-8 text-center">
        <h1 class="text-4xl font-extrabold text-red-500 tracking-tight">Tube<span class="text-white">Lite</span></h1>
        <p class="text-gray-400 mt-2">Nonton YouTube jalur VIP (No Ads)</p>
    </div>

    <div class="w-full max-w-3xl flex flex-col sm:flex-row gap-3 mb-8">
        <input type="text" id="linkInput" placeholder="Paste link YouTube di sini bang..." 
            class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition shadow-inner">
        <button onclick="putarVideo()" 
            class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-8 rounded-xl transition shadow-lg w-full sm:w-auto">
            Sikat!
        </button>
    </div>

    <div id="playerCard" class="w-full max-w-3xl bg-gray-800 p-2 sm:p-4 rounded-2xl shadow-2xl hidden border border-gray-700">
        <div class="relative w-full pb-[56.25%] bg-black rounded-xl overflow-hidden">
            <iframe id="videoPlayer" class="absolute top-0 left-0 w-full h-full" 
                src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
            </iframe>
        </div>
        <div class="mt-4 px-2 pb-2">
            <p class="text-green-400 text-sm font-semibold flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                Jalur Bebas Iklan Aktif
            </p>
        </div>
    </div>

    <script>
        function putarVideo() {
            const inputLink = document.getElementById('linkInput').value;
            if (!inputLink) {
                alert("Masukin link-nya dulu woi!");
                return;
            }

            // Jurus ngebedah link YouTube buat ngambil ID-nya doang
            let videoId = "";
            try {
                if (inputLink.includes("youtu.be/")) {
                    videoId = inputLink.split("youtu.be/")[1].split("?")[0];
                } else if (inputLink.includes("watch?v=")) {
                    videoId = inputLink.split("watch?v=")[1].split("&")[0];
                } else if (inputLink.includes("shorts/")) {
                    videoId = inputLink.split("shorts/")[1].split("?")[0];
                } else {
                    alert("Link-nya kaga valid bang, pastiin dari YouTube!");
                    return;
                }
            } catch (e) {
                alert("Waduh, gagal ngebaca link-nya nih.");
                return;
            }

            // Masukin ID ke jalur belakang (Embed) + AutoPlay
            const urlEmbed = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            
            // Tunjukin TV-nya dan puter videonya
            document.getElementById('videoPlayer').src = urlEmbed;
            document.getElementById('playerCard').classList.remove('hidden');
            
            // Kosongin kolom input biar rapi
            document.getElementById('linkInput').value = '';
        }
    </script>
</body>
</html>
