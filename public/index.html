<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeLite - No Ads</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-4">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-red-500 mb-6 text-center">TubeLite <span class="text-white">No-Ads</span></h1>
        
        <div class="flex gap-2 mb-8">
            <input type="text" id="searchInput" placeholder="Cari video apa aja..." class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:border-red-500">
            <button onclick="cariVideo()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-lg font-bold">Cari</button>
        </div>

        <div id="playerContainer" class="hidden mb-8">
            <div class="relative w-full pb-[56.25%] bg-black rounded-lg overflow-hidden shadow-lg border border-gray-700">
                <iframe id="videoPlayer" class="absolute top-0 left-0 w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <h2 id="judulVideo" class="text-xl font-bold mt-4"></h2>
        </div>

        <div id="hasilSearch" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            </div>
    </div>

    <script>
        async function cariVideo() {
            const query = document.getElementById('searchInput').value;
            const wadahHasil = document.getElementById('hasilSearch');
            
            if(!query) return alert("Ketik dulu bang yang mau dicari!");
            
            wadahHasil.innerHTML = '<p class="text-gray-400 col-span-full text-center">Lagi nyari nih, sabar yak...</p>';

            try {
                const res = await fetch(`/api/search?q=${query}`);
                const json = await res.json();
                
                wadahHasil.innerHTML = '';
                
                json.data.forEach(vid => {
                    const card = `
                        <div class="bg-gray-800 rounded-lg overflow-hidden cursor-pointer hover:ring-2 hover:ring-red-500 transition" onclick="putarVideo('${vid.videoId}', '${vid.title.replace(/'/g, "\\'")}')">
                            <div class="relative">
                                <img src="${vid.thumbnail}" class="w-full h-40 object-cover">
                                <span class="absolute bottom-2 right-2 bg-black bg-opacity-80 text-xs px-2 py-1 rounded">${vid.duration}</span>
                            </div>
                            <div class="p-3">
                                <h3 class="font-bold text-sm line-clamp-2 mb-1">${vid.title}</h3>
                                <p class="text-gray-400 text-xs">${vid.author}</p>
                            </div>
                        </div>
                    `;
                    wadahHasil.innerHTML += card;
                });
            } catch (err) {
                wadahHasil.innerHTML = '<p class="text-red-500 text-center col-span-full">Waduh, gagal nyari videonya.</p>';
            }
        }

        function putarVideo(id, judul) {
            document.getElementById('playerContainer').classList.remove('hidden');
            // Nge-load video ke iframe pake parameter autoplay
            document.getElementById('videoPlayer').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('judulVideo').innerText = judul;
            // Scroll ke atas biar enak nontonnya
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
