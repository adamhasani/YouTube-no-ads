<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YourTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#272727;--surface2:#3d3d3d;
  --border:#3d3d3d;--text:#f1f1f1;--text2:#aaa;--text3:#717171;
  --red:#ff0000;--blue:#3ea6ff;--nav-h:56px;--side-w:72px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Roboto',Arial,sans-serif;font-size:14px;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{background:none;border:none;cursor:pointer;color:inherit;font-family:inherit}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#606060;border-radius:3px}

/* NAV */
#navbar{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);
  background:var(--bg);display:flex;align-items:center;
  padding:0 16px;gap:8px;z-index:200;
}
#logo{display:flex;align-items:center;gap:12px;flex-shrink:0;margin-right:8px}
#logo svg{width:90px;height:20px}
#search-form{display:flex;flex:1;max-width:600px;margin:0 auto}
#search-input{
  flex:1;padding:8px 16px;background:#121212;
  color:var(--text);border:1px solid var(--border);
  border-right:none;border-radius:40px 0 0 40px;outline:none;font-size:15px
}
#search-input:focus{border-color:#666}
#search-btn{
  width:56px;background:var(--surface);border:1px solid var(--border);
  border-radius:0 40px 40px 0;display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0
}
#search-btn:hover{background:var(--surface2)}

/* SIDEBAR */
#sidebar{
  position:fixed;top:var(--nav-h);left:0;bottom:0;
  width:var(--side-w);background:var(--bg);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0;z-index:100;gap:4px;overflow-y:auto
}
.side-item{
  display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:12px 0;width:100%;cursor:pointer;
  border-radius:8px;font-size:10px;color:var(--text2);
  transition:background .15s
}
.side-item:hover,.side-item.active{background:var(--surface);color:var(--text)}
.side-item svg{width:24px;height:24px}

/* MAIN */
#main{margin-top:var(--nav-h);margin-left:var(--side-w);min-height:calc(100vh - var(--nav-h))}

/* CATEGORY PILLS */
#cats{
  display:flex;gap:8px;padding:12px 16px;
  overflow-x:auto;scrollbar-width:none;position:sticky;
  top:var(--nav-h);background:var(--bg);z-index:50
}
#cats::-webkit-scrollbar{display:none}
.cat-pill{
  flex-shrink:0;padding:6px 12px;border-radius:8px;
  background:var(--surface);color:var(--text);
  border:none;cursor:pointer;font-size:14px;font-weight:500;
  transition:background .15s;white-space:nowrap
}
.cat-pill:hover{background:var(--surface2)}
.cat-pill.active{background:var(--text);color:var(--bg)}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;padding:8px 16px 40px
}

/* VIDEO CARD */
.vcard{cursor:pointer}
.vthumb{
  position:relative;width:100%;aspect-ratio:16/9;
  border-radius:12px;overflow:hidden;background:#000
}
.vthumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.vcard:hover .vthumb img{transform:scale(1.04)}
.vdur{
  position:absolute;bottom:6px;right:6px;
  background:rgba(0,0,0,.85);color:#fff;
  font-size:12px;font-weight:600;padding:2px 6px;border-radius:4px
}
.vmeta{display:flex;gap:10px;margin-top:10px;align-items:flex-start}
.vavatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--surface);flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:15px;color:var(--text2)
}
.vavatar img{width:100%;height:100%;object-fit:cover}
.vinfo .vtitle{
  font-size:14px;font-weight:500;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}
.vinfo .vch{font-size:13px;color:var(--text2);margin-top:2px}
.vinfo .vstat{font-size:13px;color:var(--text2)}

/* SKELETON */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{
  background:linear-gradient(90deg,var(--surface) 25%,#333 50%,var(--surface) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px
}

/* WATCH PAGE */
#watch-page{display:none;padding:16px;max-width:1600px}
#watch-layout{display:flex;gap:20px;flex-wrap:wrap}
#player-col{flex:1 1 600px;min-width:0}
#player-wrap{
  position:relative;width:100%;padding-top:56.25%;
  border-radius:12px;overflow:hidden;background:#000
}
#player-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
#video-title{font-size:20px;font-weight:600;margin:14px 0 10px;line-height:1.4}
#video-meta{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
#ch-info{display:flex;align-items:center;gap:10px;flex:1}
#ch-avatar{width:40px;height:40px;border-radius:50%;background:var(--surface);overflow:hidden;flex-shrink:0}
#ch-avatar img{width:100%;height:100%;object-fit:cover}
#ch-name{font-weight:600;font-size:15px}
#ch-subs{font-size:13px;color:var(--text2)}
#sub-btn{
  padding:10px 16px;background:var(--text);color:var(--bg);
  border-radius:9999px;font-weight:600;font-size:14px;
  border:none;cursor:pointer;transition:opacity .2s;flex-shrink:0
}
#sub-btn:hover{opacity:.85}
#action-btns{display:flex;gap:8px;flex-wrap:wrap}
.act-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:9999px;
  background:var(--surface);color:var(--text);
  font-size:14px;font-weight:500;transition:background .15s
}
.act-btn:hover{background:var(--surface2)}
.act-btn svg{width:20px;height:20px}
#desc-box{background:var(--surface);border-radius:12px;padding:14px;margin-top:12px}
#desc-stats{font-size:14px;font-weight:600;margin-bottom:8px}
#desc-text{font-size:14px;line-height:1.6;white-space:pre-wrap;max-height:80px;overflow:hidden;transition:max-height .3s}
#desc-text.expanded{max-height:none}
#desc-toggle{margin-top:8px;font-weight:600;font-size:14px;cursor:pointer;background:none;border:none;color:var(--text)}

/* RELATED */
#related-col{flex:0 0 360px;min-width:0}
#related-col h3{font-size:16px;font-weight:600;margin-bottom:10px}
.rel-card{display:flex;gap:8px;margin-bottom:8px;cursor:pointer}
.rel-card:hover{opacity:.85}
.rel-thumb{position:relative;flex-shrink:0;width:168px;height:94px;border-radius:8px;overflow:hidden;background:#000}
.rel-thumb img{width:100%;height:100%;object-fit:cover}
.rel-dur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;font-weight:600;padding:1px 4px;border-radius:3px}
.rel-info .rel-title{font-size:13px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.rel-info .rel-ch{font-size:12px;color:var(--text2);margin-top:2px}
.rel-info .rel-stat{font-size:12px;color:var(--text2)}

/* SEARCH PAGE */
#search-page{display:none;padding:16px 16px 40px}
#sq-title{font-size:14px;color:var(--text2);margin-bottom:16px}
#sq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* ERROR BANNER */
.err-banner{
  background:#1a0a0a;border:1px solid #ff4444;border-radius:10px;
  padding:16px;margin:16px;color:#ff9999;line-height:1.7
}
.err-banner h3{color:#ff4444;margin-bottom:8px}
.err-banner a{color:var(--blue)}
.err-banner code{background:#2a2a2a;padding:2px 6px;border-radius:4px;font-size:13px}

/* SPINNER */
#spinner{display:none;justify-content:center;padding:60px;flex-direction:column;align-items:center;gap:16px}
.spin-ring{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--text2)}
.empty svg{margin:0 auto 16px}

/* API KEY MODAL */
#key-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:1000;align-items:center;justify-content:center
}
#key-modal.show{display:flex}
#key-box{
  background:#1a1a1a;border:1px solid var(--border);border-radius:16px;
  padding:28px;max-width:480px;width:90%;
}
#key-box h2{font-size:20px;margin-bottom:8px}
#key-box p{color:var(--text2);font-size:14px;margin-bottom:16px;line-height:1.6}
#key-box input{
  width:100%;padding:12px 14px;background:#0f0f0f;border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px
}
#key-box input:focus{border-color:var(--blue)}
#key-save{
  width:100%;padding:12px;background:var(--red);color:#fff;
  border-radius:8px;font-size:15px;font-weight:600;border:none;cursor:pointer
}
#key-save:hover{background:var(--red-hover,#cc0000)}
#key-link{display:block;text-align:center;margin-top:10px;color:var(--blue);font-size:13px}

@media(max-width:640px){
  #main{margin-left:0}
  #sidebar{display:none}
  #grid{grid-template-columns:1fr 1fr;gap:8px;padding:8px}
  #watch-layout{flex-direction:column}
  #related-col{flex:none;width:100%}
  #navbar{padding:0 8px}
  #search-input{font-size:14px}
}
@media(max-width:400px){
  #grid{grid-template-columns:1fr;gap:12px}
}
</style>
</head>

    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 6.5C21 8.43 19.43 10 17.5 10S14 8.43 14 6.5 15.57 3 17.5 3 21 4.57 21 6.5zM17.5 11.5c-2.33 0-7 1.17-7 3.5V17h14v-2c0-2.33-4.67-3.5-7-3.5zM7 11c-1.93 0-3.5-1.57-3.5-3.5S5.07 4 7 4s3.5 1.57 3.5 3.5S8.93 11 7 11zm0 1.5C4.67 12.5 0 13.67 0 16v2h10v-2c0-2.33-4.67-3.5-7-3.5z"/></svg>
    Gaming
  </div>
  <div class="side-item" onclick="doSearchTerm('berita terkini')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 3H2C.9 3 0 3.9 0 5v14c0 1.1.9 2 2 2h20c1.1 0 1.99-.9 1.99-2L24 5c0-1.1-.9-2-2-2zm0 16H2V5h20v14z"/></svg>
    Berita
  </div>
  <div class="side-item" onclick="doSearchTerm('olahraga indonesia')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>
    Olahraga
  </div>
</aside>

<!-- MAIN -->
<div id="main">

  <!-- HOME PAGE -->
  <div id="home-page">
    <div id="cats"></div>
    <div id="spinner" style="display:flex">
      <div class="spin-ring"></div>
      <span style="color:var(--text2)">Memuat video...</span>
    </div>
    <div id="grid"></div>
  </div>

  <!-- WATCH PAGE -->
  <div id="watch-page">
    <div id="watch-layout">
      <div id="player-col">
        <div id="player-wrap">
          <iframe id="yt-player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
        <h1 id="video-title">Memuat...</h1>
        <div id="video-meta">
          <div id="ch-info">
            <div id="ch-avatar"></div>
            <div>
              <div id="ch-name"></div>
              <div id="ch-subs"></div>
            </div>
            <button id="sub-btn">Berlangganan</button>
          </div>
          <div id="action-btns">
            <button class="act-btn">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
              <span id="like-count">Suka</span>
            </button>
            <button class="act-btn">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 7l-7 4 7 4V7zm-15 8h-2V5h2v10zm4 0h-2V5h2v10z"/></svg>
              Bagikan
            </button>
          </div>
        </div>
        <div id="desc-box">
          <div id="desc-stats"></div>
          <div id="desc-text"></div>
          <button id="desc-toggle" onclick="toggleDesc()">Tampilkan selengkapnya</button>
        </div>
      </div>
      <div id="related-col">
        <h3>Video Selanjutnya</h3>
        <div id="related-list"></div>
      </div>
    </div>
  </div>

  <!-- SEARCH PAGE -->
  <div id="search-page">
    <div id="sq-title"></div>
    <div id="sq-grid"></div>
  </div>

</div>

<!-- API KEY MODAL -->
<div id="key-modal">
  <div id="key-box">
    <h2>🔑 Masukkan YouTube API Key</h2>
    <p>Dapatkan API key gratis dari <a href="https://console.cloud.google.com" target="_blank">Google Cloud Console</a> → APIs &amp; Services → Credentials. Aktifkan <strong>YouTube Data API v3</strong> terlebih dahulu.</p>
    <input id="key-input" type="text" placeholder="AIzaSy..." />
    <button id="key-save" onclick="saveKey()">Simpan &amp; Muat Video</button>
    <a id="key-link" href="https://console.cloud.google.com" target="_blank">→ Buka Google Cloud Console</a>
  </div>
</div>

<script>
const BASE = 'https://www.googleapis.com/youtube/v3';
let API_KEY = localStorage.getItem('yt_api_key') || '';

const CATS = [
  {id:'',label:'Semua'},{id:'10',label:'Musik'},{id:'20',label:'Gaming'},
  {id:'25',label:'Berita'},{id:'17',label:'Olahraga'},{id:'28',label:'Teknologi'},
  {id:'24',label:'Hiburan'},{id:'22',label:'Blog'},{id:'1',label:'Film'},
  {id:'23',label:'Komedi'},{id:'27',label:'Edukasi'},{id:'19',label:'Travel'},
  {id:'2',label:'Otomotif'},{id:'15',label:'Hewan'}
];

let currentCat = '';

// ── UTILS ──
function fmtViews(n){
  if(!n)return'0';n=parseInt(n);
  if(n>=1e9)return(n/1e9).toFixed(1)+'M penayangan';
  if(n>=1e6)return(n/1e6).toFixed(1)+'jt penayangan';
  if(n>=1e3)return(n/1e3).toFixed(0)+'rb penayangan';
  return n+' penayangan';
}
function fmtNum(n){
  if(!n)return'0';n=parseInt(n);
  if(n>=1e9)return(n/1e9).toFixed(1)+'M';
  if(n>=1e6)return(n/1e6).toFixed(1)+'jt';
  if(n>=1e3)return(n/1e3).toFixed(0)+'rb';
  return n.toString();
}
function fmtAgo(d){
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60)return'baru saja';
  const m=Math.floor(s/60);if(m<60)return m+'m lalu';
  const h=Math.floor(m/60);if(h<24)return h+' jam lalu';
  const day=Math.floor(h/24);if(day<7)return day+' hari lalu';
  const w=Math.floor(day/7);if(w<5)return w+' minggu lalu';
  const mo=Math.floor(day/30);if(mo<12)return mo+' bulan lalu';
  return Math.floor(day/365)+' tahun lalu';
}
function fmtDur(d){
  if(!d)return'';
  const m=d.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return'';
  const h=parseInt(m[1]||0),mn=parseInt(m[2]||0),s=parseInt(m[3]||0);
  if(h>0)return`${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return`${mn}:${String(s).padStart(2,'0')}`;
}
function $id(id){return document.getElementById(id)}

// ── API ──
async function apiFetch(endpoint,params){
  if(!API_KEY){showKeyModal();return null;}
  params.key=API_KEY;
  const url=`${BASE}/${endpoint}?`+new URLSearchParams(params);
  try{
    const r=await fetch(url);const d=await r.json();
    if(d.error){
      if(d.error.code===403)alert('API key tidak valid atau quota habis. Cek kembali key kamu.');
      else console.error(d.error.message);
      return null;
    }
    return d;
  }catch(e){console.error(e);return null;}
}

async function getTrending(catId=''){
  const p={part:'snippet,statistics,contentDetails',chart:'mostPopular',maxResults:24,regionCode:'ID'};
  if(catId)p.videoCategoryId=catId;
  return apiFetch('videos',p);
}

async function getVideoDetails(id){
  return apiFetch('videos',{part:'snippet,statistics,contentDetails',id});
}

async function getRelated(title,excludeId){
  const d=await apiFetch('search',{part:'snippet',q:title,type:'video',maxResults:15});
  if(!d)return[];
  const ids=d.items.filter(i=>i.id.videoId!==excludeId).map(i=>i.id.videoId).join(',');
  if(!ids)return[];
  const d2=await apiFetch('videos',{part:'snippet,statistics,contentDetails',id:ids});
  return d2?.items||[];
}

async function searchVids(q){
  const d=await apiFetch('search',{part:'snippet',q,type:'video',maxResults:20});
  if(!d)return[];
  const ids=d.items.map(i=>i.id.videoId).join(',');
  if(!ids)return[];
  const d2=await apiFetch('videos',{part:'snippet,statistics,contentDetails',id:ids});
  return d2?.items||[];
}

async function getChannel(id){
  return apiFetch('channels',{part:'snippet,statistics',id});
}

// ── RENDER ──
function videoCardHTML(v,horiz=false){
  const id=v.id?.videoId||v.id;
  const sn=v.snippet||{};
  const st=v.statistics||{};
  const cd=v.contentDetails||{};
  const thumb=sn.thumbnails?.high?.url||sn.thumbnails?.medium?.url||sn.thumbnails?.default?.url||'';
  const dur=fmtDur(cd.duration);
  const views=fmtViews(st.viewCount);
  const ago=sn.publishedAt?fmtAgo(sn.publishedAt):'';
  const ch=sn.channelTitle||'';
  const title=(sn.title||'').replace(/</g,'&lt;');

  if(horiz){
    return`<div class="rel-card" onclick="openWatch('${id}')">
      <div class="rel-thumb">
        ${thumb?`<img src="${thumb}" loading="lazy" alt="" />`:``}
        ${dur?`<span class="rel-dur">${dur}</span>`:''}
      </div>
      <div class="rel-info">
        <div class="rel-title">${title}</div>
        <div class="rel-ch">${ch}</div>
        <div class="rel-stat">${views}${ago?' • '+ago:''}</div>
      </div>
    </div>`;
  }

  const initials=(ch[0]||'?').toUpperCase();
  return`<div class="vcard" onclick="openWatch('${id}')">
    <div class="vthumb">
      ${thumb?`<img src="${thumb}" loading="lazy" alt="" />`:``}
      ${dur?`<span class="vdur">${dur}</span>`:''}
    </div>
    <div class="vmeta">
      <div class="vavatar">${initials}</div>
      <div class="vinfo">
        <div class="vtitle">${title}</div>
        <div class="vch">${ch}</div>
        <div class="vstat">${views}${ago?' • '+ago:''}</div>
      </div>
    </div>
  </div>`;
}

function skelCardHTML(){
  return`<div>
    <div class="skel" style="width:100%;aspect-ratio:16/9;border-radius:12px"></div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <div class="skel" style="width:36px;height:36px;border-radius:50%;flex-shrink:0"></div>
      <div style="flex:1">
        <div class="skel" style="height:13px;border-radius:4px;margin-bottom:7px;width:90%"></div>
        <div class="skel" style="height:12px;border-radius:4px;margin-bottom:7px;width:60%"></div>
        <div class="skel" style="height:11px;border-radius:4px;width:70%"></div>
      </div>
    </div>
  </div>`;
}

// ── PAGES ──
function showPage(page){
  $id('home-page').style.display=page==='home'?'block':'none';
  $id('watch-page').style.display=page==='watch'?'block':'none';
  $id('search-page').style.display=page==='search'?'block':'none';
}

async function showHome(){
  showPage('home');
  buildCats();
  await loadCategory(currentCat);
}

function buildCats(){
  const catsEl=$id('cats');
  catsEl.innerHTML=CATS.map(c=>`
    <button class="cat-pill${c.id===currentCat?' active':''}" onclick="loadCategory('${c.id}')">${c.label}</button>
  `).join('');
}

async function loadCategory(catId, _label){
  currentCat=catId;
  buildCats();
  showPage('home');
  const grid=$id('grid');
  const sp=$id('spinner');
  grid.innerHTML='';
  sp.style.display='flex';

  if(!API_KEY){sp.style.display='none';showKeyModal();return;}

  grid.innerHTML=Array(12).fill(0).map(()=>skelCardHTML()).join('');
  const data=await getTrending(catId);
  sp.style.display='none';
  if(!data){grid.innerHTML='';return;}
  grid.innerHTML=data.items.map(v=>videoCardHTML(v)).join('');
}

async function openWatch(videoId){
  showPage('watch');
  window.scrollTo(0,0);

  $id('yt-player').src=`https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
  $id('video-title').textContent='Memuat...';
  $id('desc-stats').textContent='';
  $id('desc-text').textContent='';
  $id('like-count').textContent='Suka';
  $id('ch-name').textContent='';
  $id('ch-subs').textContent='';
  $id('ch-avatar').innerHTML='';
  $id('related-list').innerHTML=Array(6).fill(0).map(()=>`
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div class="skel" style="width:168px;height:94px;border-radius:8px;flex-shrink:0"></div>
      <div style="flex:1"><div class="skel" style="height:12px;border-radius:4px;margin-bottom:6px;width:90%"></div>
      <div class="skel" style="height:11px;border-radius:4px;width:60%"></div></div>
    </div>`).join('');

  const data=await getVideoDetails(videoId);
  if(!data?.items?.length)return;
  const v=data.items[0];
  const sn=v.snippet||{};
  const st=v.statistics||{};

  document.title=`${sn.title||''} - YourTube`;
  $id('video-title').textContent=sn.title||'';
  $id('desc-stats').textContent=`${fmtNum(st.viewCount)} penayangan • ${fmtAgo(sn.publishedAt)}`;
  $id('desc-text').textContent=sn.description||'';
  $id('desc-text').classList.remove('expanded');
  $id('desc-toggle').textContent='Tampilkan selengkapnya';
  $id('like-count').textContent=fmtNum(st.likeCount)||'Suka';

  const chId=sn.channelId;
  $id('ch-name').textContent=sn.channelTitle||'';

  if(chId){
    getChannel(chId).then(d=>{
      if(!d?.items?.length)return;
      const ch=d.items[0];
      $id('ch-subs').textContent=`${fmtNum(ch.statistics?.subscriberCount)} subscriber`;
      const img=ch.snippet?.thumbnails?.default?.url;
      if(img)$id('ch-avatar').innerHTML=`<img src="${img}" style="width:40px;height:40px;border-radius:50%;object-fit:cover" />`;
      else $id('ch-avatar').textContent=(sn.channelTitle[0]||'?').toUpperCase();
    });
  }

  getRelated(sn.title||'',videoId).then(items=>{
    $id('related-list').innerHTML=items.map(v=>videoCardHTML(v,true)).join('');
  });
}

function toggleDesc(){
  const el=$id('desc-text');
  const expanded=el.classList.toggle('expanded');
  $id('desc-toggle').textContent=expanded?'Tampilkan lebih sedikit':'Tampilkan selengkapnya';
}

function doSearch(e){
  e.preventDefault();
  const q=$id('search-input').value.trim();
  if(q)doSearchTerm(q);
}

async function doSearchTerm(q){
  $id('search-input').value=q;
  showPage('search');
  window.scrollTo(0,0);
  $id('sq-title').innerHTML=`Hasil untuk: <strong style="color:var(--text)">"${q}"</strong>`;
  const grid=$id('sq-grid');
  grid.innerHTML=Array(8).fill(0).map(()=>skelCardHTML()).join('');
  const items=await searchVids(q);
  grid.innerHTML=items.length
    ?items.map(v=>videoCardHTML(v)).join('')
    :`<div class="empty" style="grid-column:1/-1"><p>Tidak ada hasil untuk "${q}"</p></div>`;
}

// ── API KEY MODAL ──
function showKeyModal(){
  $id('key-input').value=API_KEY||'';
  $id('key-modal').classList.add('show');
}
function saveKey(){
  const k=$id('key-input').value.trim();
  if(!k)return alert('Masukkan API key dulu!');
  API_KEY=k;
  localStorage.setItem('yt_api_key',k);
  $id('key-modal').classList.remove('show');
  showHome();
}
$id('key-modal').addEventListener('click',function(e){
  if(e.target===this)this.classList.remove('show');
});

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  if(!API_KEY){
    showKeyModal();
    $id('spinner').style.display='none';
    buildCats();
  } else {
    showHome();
  }
});
</script>
</body>
</html>
