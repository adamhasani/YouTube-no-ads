<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0" id="vp-meta"/>
<title>YourTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--surface:#272727;--surface2:#3d3d3d;--border:#3d3d3d;--text:#f1f1f1;--text2:#aaa;--red:#ff0000;--blue:#3ea6ff;--nav-h:56px;--side-w:72px;--side-full:240px}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Roboto',Arial,sans-serif;font-size:14px;overflow-x:hidden;transition:background .3s,color .3s}
body.light{--bg:#fff;--surface:#f2f2f2;--surface2:#e5e5e5;--border:#ddd;--text:#0f0f0f;--text2:#606060}
a{color:inherit;text-decoration:none}
button{background:none;border:none;cursor:pointer;color:inherit;font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#606060;border-radius:3px}

/* NAV */
#navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--bg);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:300;transition:background .3s}
#logo-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative}
.icon-btn:hover{background:var(--surface)}
.icon-btn svg{width:22px;height:22px}
#logo-svg{cursor:pointer}

/* search */
#search-wrap{flex:1;max-width:580px;margin:0 auto;position:relative}
#search-row{display:flex}
#search-input{flex:1;padding:8px 16px;background:#121212;color:var(--text);border:1px solid var(--border);border-right:none;border-radius:40px 0 0 40px;outline:none;font-size:15px}
body.light #search-input{background:#f8f8f8}
#search-input:focus{border-color:var(--blue)}
#search-btn{width:52px;background:var(--surface);border:1px solid var(--border);border-radius:0 40px 40px 0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#search-btn:hover{background:var(--surface2)}
#suggest-box{position:absolute;top:calc(100% + 4px);left:0;right:52px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;z-index:400;display:none;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.sug-item{padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:var(--text)}
.sug-item:hover{background:var(--surface2)}
.sug-item svg{flex-shrink:0;opacity:.5;width:16px;height:16px}

/* nav right */
#nav-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.badge{position:absolute;top:3px;right:3px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:9999px;display:flex;align-items:center;justify-content:center}

/* SIDEBAR */
#sidebar{position:fixed;top:var(--nav-h);left:0;bottom:0;width:var(--side-w);background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:8px 0;z-index:100;overflow-y:auto;overflow-x:hidden;transition:width .25s,background .3s;scrollbar-width:none}
#sidebar.exp{width:var(--side-full);align-items:flex-start}
#sidebar::-webkit-scrollbar{display:none}
.si{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 0;width:100%;cursor:pointer;border-radius:10px;font-size:10px;color:var(--text2);transition:background .15s}
.si:hover,.si.on{background:var(--surface);color:var(--text)}
.si svg{width:22px;height:22px;flex-shrink:0}
#sidebar.exp .si{flex-direction:row;padding:10px 16px;gap:20px;font-size:14px;align-items:center}
#sidebar.exp .si.on{font-weight:600}
.sdiv{width:40px;height:1px;background:var(--border);margin:6px 0;flex-shrink:0}
#sidebar.exp .sdiv{width:calc(100% - 32px);margin:6px 16px}
.slabel{display:none;font-size:14px;font-weight:600;padding:8px 16px;width:100%}
#sidebar.exp .slabel{display:block}

/* MAIN */
#main{margin-top:var(--nav-h);margin-left:var(--side-w);transition:margin-left .25s;min-height:calc(100vh - var(--nav-h))}
#main.exp{margin-left:var(--side-full)}

/* CATS */
#cats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--nav-h);background:var(--bg);z-index:50;transition:background .3s}
#cats::-webkit-scrollbar{display:none}
.cpill{flex-shrink:0;padding:6px 12px;border-radius:8px;background:var(--surface);color:var(--text);border:none;cursor:pointer;font-size:14px;font-weight:500;transition:background .15s;white-space:nowrap}
.cpill:hover{background:var(--surface2)}
.cpill.on{background:var(--text);color:var(--bg)}

/* PERS BANNER */
#pbanner{display:none;margin:8px 16px;padding:10px 14px;background:linear-gradient(135deg,#1a1a3e,#2d1b4e);border-radius:10px;align-items:center;gap:10px;font-size:13px;color:#c9b8ff}

/* GRID */
#grid,#sq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:8px 16px 40px}

/* VIDEO CARD */
.vc{cursor:pointer}
.vt{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:#000}
.vt img{width:100%;height:100%;object-fit:cover;transition:transform .3s;display:block}
.vc:hover .vt img{transform:scale(1.04)}
.vdur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:12px;font-weight:600;padding:2px 6px;border-radius:4px}
.vsavebtn{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.75);color:#fff;border-radius:4px;padding:4px 8px;font-size:11px;display:none;align-items:center;gap:4px;border:none;cursor:pointer}
.vt:hover .vsavebtn{display:flex}
.vmi{display:flex;gap:10px;margin-top:10px;align-items:flex-start}
.vav{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;cursor:pointer}
.vav img{width:100%;height:100%;object-fit:cover}
.vnm{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vch{font-size:13px;color:var(--text2);margin-top:2px}
.vst{font-size:13px;color:var(--text2)}

/* SKELETON */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}

/* WATCH PAGE */
#watch-page{display:none;padding:16px 16px 40px;max-width:1800px}
#wlayout{display:flex;gap:20px;flex-wrap:wrap}
#pcol{flex:1 1 600px;min-width:0;transition:flex .3s}

/* player */
#pwrap{position:relative;width:100%;padding-top:56.25%;border-radius:12px;overflow:hidden;background:#000}
#pwrap.theater{border-radius:0;margin:0 -16px;width:calc(100% + 32px)}
#yt-player,#pwrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}

/* player overlay controls */
#pctrl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:8px 12px 12px;display:flex;align-items:center;gap:6px;opacity:0;transition:opacity .2s;z-index:10;flex-wrap:wrap;pointer-events:none; /* Agar tidak memblokir tombol settings YT bawaan */}
#pwrap:hover #pctrl{opacity:1}
#pctrl > * {pointer-events:auto;} /* Mengizinkan klik pada elemen kustom kita sendiri */

.pb{background:none;border:none;color:#fff;cursor:pointer;padding:4px 5px;border-radius:5px;display:flex;align-items:center;flex-shrink:0}
.pb:hover{background:rgba(255,255,255,.18)}
.pb svg{width:22px;height:22px}
.psel{background:rgba(0,0,0,.65);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 7px;font-size:13px;cursor:pointer;font-family:inherit}
.psp{flex:1}

/* video info */
#vtitle{font-size:20px;font-weight:600;margin:14px 0 8px;line-height:1.4}
#lbar-wrap{display:none;margin-bottom:10px}
#lbar-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px}
#lbar{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
#lbar-fill{height:100%;background:var(--blue);transition:width .6s;border-radius:99px}
#vmeta{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px}
#chinfo{display:flex;align-items:center;gap:10px;flex:1;min-width:200px}
#chavatar{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px}
#chavatar img{width:100%;height:100%;object-fit:cover}
#subbtn{padding:10px 16px;background:var(--text);color:var(--bg);border-radius:9999px;font-weight:600;font-size:14px;cursor:pointer}
#subbtn:hover{opacity:.85}
#abtns{display:flex;gap:7px;flex-wrap:wrap}
.ab{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:9999px;background:var(--surface);font-size:13px;font-weight:500;transition:background .15s;white-space:nowrap;cursor:pointer}
.ab:hover,.ab.on{background:var(--surface2)}
.ab.on{background:var(--text);color:var(--bg)}
.ab svg{width:18px;height:18px;flex-shrink:0}

/* desc box */
#dbox{background:var(--surface);border-radius:12px;padding:14px;margin-top:10px;transition:background .3s}
#dstats{font-size:14px;font-weight:600;margin-bottom:8px}
#dtxt{font-size:14px;line-height:1.6;white-space:pre-wrap;max-height:72px;overflow:hidden;transition:max-height .4s}
#dtxt.exp{max-height:2000px}
#dtoggle{margin-top:8px;font-weight:600;font-size:14px;cursor:pointer;background:none;border:none;color:var(--text)}

/* notes */
#notesec{display:none;margin-top:12px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
#notehdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);cursor:pointer;font-weight:600;font-size:14px}
#notebody{display:none}
#notearea{width:100%;min-height:100px;background:var(--bg);color:var(--text);border:none;padding:12px;font-family:inherit;font-size:14px;resize:vertical;outline:none;display:block;transition:background .3s,color .3s}

/* related */
#rcol{flex:0 0 360px;min-width:0}
.rcard{display:flex;gap:8px;margin-bottom:8px;cursor:pointer;padding:4px;border-radius:8px;transition:background .15s}
.rcard:hover{background:var(--surface)}
.rthumb{position:relative;flex-shrink:0;width:168px;height:94px;border-radius:8px;overflow:hidden;background:#000}
.rthumb img{width:100%;height:100%;object-fit:cover;display:block}
.rdur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;font-weight:600;padding:1px 4px;border-radius:3px}
.rtitle{font-size:13px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rch,.rst{font-size:12px;color:var(--text2);margin-top:2px}

/* MINI PLAYER */
#mini{position:fixed;bottom:20px;right:20px;width:300px;background:#111;border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.8);z-index:500;display:none;flex-direction:column}
#mini-inner{width:100%;aspect-ratio:16/9;background:#000}
#mini-inner iframe,#mini-inner #yt-player{width:100%;height:100%;border:none}
#mini-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#1a1a1a}
#mini-title{font-size:11px;color:#aaa;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
#mini-back{font-size:12px;font-weight:600;color:var(--blue);cursor:pointer;white-space:nowrap;background:none;border:none}
#mini-x{cursor:pointer;color:#aaa;background:none;border:none;font-size:16px;line-height:1;padding:0 2px}

/* WATCH LATER PANEL */
#wlpanel{position:fixed;top:var(--nav-h);right:-380px;width:360px;bottom:0;background:var(--bg);border-left:1px solid var(--border);z-index:250;transition:right .3s,background .3s;overflow-y:auto;padding:16px}
#wlpanel.open{right:0}
.wlitem{display:flex;gap:8px;margin-bottom:10px;cursor:pointer;padding:6px;border-radius:8px;transition:background .15s;align-items:flex-start}
.wlitem:hover{background:var(--surface)}
.wlthumb{width:100px;aspect-ratio:16/9;border-radius:6px;overflow:hidden;background:#000;flex-shrink:0}
.wlthumb img{width:100%;height:100%;object-fit:cover;display:block}

/* SEARCH PAGE */
#sq-page{display:none;padding:16px 16px 40px}
#sq-title{font-size:14px;color:var(--text2);margin-bottom:16px}

/* SPINNER */
#spinner{display:none;justify-content:center;padding:60px;flex-direction:column;align-items:center;gap:14px}
.sring{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:10px 20px;border-radius:9999px;font-size:14px;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

/* EMPTY / ERR */
.empty{text-align:center;padding:80px 20px;color:var(--text2)}
.err{background:#1a0a0a;border:1px solid #f44;border-radius:10px;padding:16px;margin:16px;color:#f99;line-height:1.7}
.err h3{color:#f44;margin-bottom:8px}

/* RESPONSIVE */
@media(max-width:640px){
  #main{margin-left:0!important}
  #sidebar{display:none}
  #grid,#sq-grid{grid-template-columns:1fr 1fr;gap:8px;padding:8px}
  #wlayout{flex-direction:column}
  #rcol{flex:none;width:100%}
  #watch-page{padding:0 0 40px}
  #mini{width:240px}
  #wlpanel{width:100%;right:-100%}
  #pwrap{border-radius:0}
  #pctrl{flex-wrap:wrap}
}
@media(max-width:380px){#grid,#sq-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav id="navbar">
  <div id="logo-wrap">
    <button class="icon-btn" onclick="toggleSidebar()" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <svg id="logo-svg" onclick="showHome()" height="20" viewBox="0 0 120 20">
      <path d="M27.97 3.12C27.64 1.89 26.68.93 25.45.6 23.22 0 14.28 0 14.28 0S5.35 0 3.12.6C1.89.93.93 1.89.6 3.12 0 5.35 0 10 0 10s0 4.65.6 6.88c.33 1.23 1.29 2.19 2.52 2.52C5.35 20 14.28 20 14.28 20s8.93 0 11.17-.6c1.23-.33 2.19-1.29 2.52-2.52C28.57 14.65 28.57 10 28.57 10s0-4.65-.6-6.88z" fill="#FF0000"/>

  </div>

  <div id="search-wrap">
    <form onsubmit="doSearch(event)" autocomplete="off">
      <div id="search-row">
        <input id="search-input" type="text" placeholder="Cari video..." oninput="onSugInput(this.value)" onfocus="onSugFocus()" onblur="onSugBlur()"/>
        <button id="search-btn" type="submit">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#aaa"><path d="M20.87 20.17l-5.59-5.59C16.35 13.35 17 11.75 17 10c0-3.87-3.13-7-7-7s-7 3.13-7 7 3.13 7 7 7c1.75 0 3.35-.65 4.58-1.71l5.59 5.59.7-.71zM10 16c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
        </button>
      </div>
      <div id="suggest-box"></div>

  </div>

  <div id="nav-right">

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 9V7h-2V5c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2v-2h-2V9h2zm-4 10H4V5h14v14zM10 9H6v2h4V9zm0 4H6v2h4v-2zm4-4h-2v2h2V9zm0 4h-2v2h2v-2z"/></svg>
      <span class="badge" id="wl-badge" style="display:none">0</span>

    <button class="icon-btn" onclick="toggleTheme()" title="Ganti Tema">

    </button>
  </div>
</nav>

  <div class="si on" id="sb-home" onclick="showHome()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Beranda</span>
  </div>
  <div class="si" onclick="doSearchTerm('shorts viral')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.77 10.32l-1.2-.5L18 9l.5-1.2.5 1.2 1.2.5-1.2.5L18 11.2l-.23-.88zM3 9l2.93 7h1.76l1.44-3.39L10.56 16h1.76L15.26 9h-1.7l-1.45 3.48L10.56 9H8.81l-1.45 3.48L5.91 9H3z"/></svg>
    <span>Shorts</span>
  </div>
  <div class="si" onclick="openWLPanel()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 9V7h-2V5c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2v-2h-2V9h2zm-4 10H4V5h14v14z"/></svg>
    <span>Tonton Nanti</span>

  <div class="sdiv"></div>

  <div class="si" onclick="loadCat('')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.2 10H14L17 3H11v8H8l6.8 9z"/></svg>
    <span>Trending</span>
  </div>
  <div class="si" onclick="doSearchTerm('musik indonesia terbaru')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    <span>Musik</span>
  </div>
  <div class="si" onclick="doSearchTerm('gaming indonesia')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H9v2H7v-2H5v-2h2V9h2v2h2v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 9 18.5 9s1.5.67 1.5 1.5S19.33 12 18.5 12z"/></svg>

  <div class="si" onclick="doSearchTerm('berita terkini hari ini')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 3H2C.9 3 0 3.9 0 5v14c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H2V5h20v14zM4 9h4v2H4zm0 4h4v2H4zm0-8h16v2H4zm6 4h10v2H10zm0 4h10v2H10z"/></svg>
    <span>Berita</span>
  </div>
  <div class="si" onclick="doSearchTerm('olahraga indonesia')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>
    <span>Olahraga</span>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ═══════════════════════════════
// STATE / CONFIG
// ═══════════════════════════════

// API Key yang sudah dimasukkan sesuai permintaanmu
const API_KEY = 'AIzaSyDGL07gZV6q40NEsSJ_oA4vaT84est1dXM'; 

const BASE='https://www.googleapis.com/youtube/v3';
let sideExp=window.innerWidth>1024;
let curCat='';
let curVidId=null;
let curVidData=null;
let ytP=null,ytReady=false,pendVid=null;
let autoRep=false,theaterOn=false,curSpd=1;
let miniActive=false,pObs=null;
let sugTimer=null;
let avCache={};
let wHist=JSON.parse(localStorage.getItem('yt_hist')||'[]');
let wLater=JSON.parse(localStorage.getItem('yt_later')||'[]');

// Avatar colors
const AVC=['#e53935','#8e24aa','#1e88e5','#00897b','#f4511e','#6d4c41','#546e7a','#43a047','#fb8c00','#d81b60'];
function avc(s){let h=0;for(let c of(s||''))h=(h*31+c.charCodeAt(0))&0xffffffff;return AVC[Math.abs(h)%AVC.length];}

// ═══════════════════════════════
// YT IFRAME API
// ═══════════════════════════════
window.onYouTubeIframeAPIReady=function(){ytReady=true;if(pendVid){loadP(pendVid);pendVid=null;}};

function loadP(vid){
  if(!ytReady){pendVid=vid;return;}
  // move back to main wrap if in mini
  const pw=G('pwrap'),mi=G('mini-inner'),pe=G('yt-player');
  if(mi.contains(pe)) pw.insertBefore(pe,pw.firstChild);

  if(ytP){ytP.loadVideoById(vid);return;}
  ytP=new YT.Player('yt-player',{
    host: 'https://www.youtube.com', // Memaksa mode desktop agar sulih suara muncul
    videoId:vid,
    playerVars:{
      autoplay:1,
      rel:0,
      modestbranding:1,
      playsinline:1, // Tetap berada di halaman (tidak full screen native) di hp
      enablejsapi:1
    },
    events:{
      onReady(e){e.target.setPlaybackRate(curSpd);},
      onStateChange(e){if(e.data===YT.PlayerState.ENDED&&autoRep){ytP.seekTo(0);ytP.playVideo();}}
    }
  });
}

function yc(cmd){if(ytP&&ytP[cmd])ytP[cmd]();}
function setSpd(v){curSpd=parseFloat(v);if(ytP)ytP.setPlaybackRate(curSpd);}
function setCap(lang){
  if(!ytP)return;
  try{
    if(!lang){ytP.unloadModule&&ytP.unloadModule('captions');}
    else{ytP.loadModule&&ytP.loadModule('captions');ytP.setOption&&ytP.setOption('captions','track',{languageCode:lang});}
  }catch(e){}
}

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
function fv(n){if(!n)return'0';n=parseInt(n);if(n>=1e9)return(n/1e9).toFixed(1)+'M';if(n>=1e6)return(n/1e6).toFixed(1)+'jt';if(n>=1e3)return(n/1e3).toFixed(0)+'rb';return n.toString();}
function fvl(n){if(!n)return'0 tayangan';n=parseInt(n);if(n>=1e6)return(n/1e6).toFixed(1)+' juta tayangan';if(n>=1e3)return(n/1e3).toFixed(0)+' ribu tayangan';return n.toLocaleString('id')+' tayangan';}
function ago(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'baru saja';const m=Math.floor(s/60);if(m<60)return m+'m lalu';const h=Math.floor(m/60);if(h<24)return h+' jam lalu';const dy=Math.floor(h/24);if(dy<7)return dy+' hari lalu';const w=Math.floor(dy/7);if(w<5)return w+' minggu lalu';const mo=Math.floor(dy/30);if(mo<12)return mo+' bulan lalu';return Math.floor(dy/365)+' tahun lalu';}
function dur(d){if(!d)return'';const m=d.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);if(!m)return'';const h=parseInt(m[1]||0),mn=parseInt(m[2]||0),s=parseInt(m[3]||0);if(h>0)return`${h}:${pad(mn)}:${pad(s)}`;return`${mn}:${pad(s)}`;}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function G(id){return document.getElementById(id);}
function toast(msg,ms=2600){const t=G('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}

// ═══════════════════════════════
// API
// ═══════════════════════════════
async function api(ep,p){
  p.key=API_KEY;
  const url=`${BASE}/${ep}?`+new URLSearchParams(p);
  try{const r=await fetch(url),d=await r.json();if(d.error){if(d.error.code===403)toast('⚠️ API key tidak valid / quota habis');else console.error(d.error);return null;}return d;}
  catch(e){console.error(e);return null;}
}

async function fetchAv(ids){
  const miss=[...new Set(ids)].filter(id=>!avCache[id]&&id);
  if(!miss.length)return;
  for(let i=0;i<miss.length;i+=50){
    const d=await api('channels',{part:'snippet',id:miss.slice(i,i+50).join(','),maxResults:50});
    if(d?.items)d.items.forEach(ch=>{avCache[ch.id]=ch.snippet?.thumbnails?.default?.url||'';});
  }
}

// ═══════════════════════════════
// HISTORY + PERSONALIZATION
// ═══════════════════════════════
function addHist(v){
  const id=v.id?.videoId||v.id;
  wHist=wHist.filter(x=>x.id!==id);
  wHist.unshift({id,title:v.snippet?.title,ch:v.snippet?.channelTitle,chId:v.snippet?.channelId,thumb:v.snippet?.thumbnails?.medium?.url||'',ts:Date.now()});
  wHist=wHist.slice(0,60);
  localStorage.setItem('yt_hist',JSON.stringify(wHist));
}
function getPersonTerms(){
  if(wHist.length<2)return[];
  const c={};wHist.slice(0,20).forEach(v=>{if(v.ch)c[v.ch]=(c[v.ch]||0)+1;});
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);
}

// ═══════════════════════════════
// WATCH LATER
// ═══════════════════════════════
function inWL(id){return wLater.some(v=>v.id===id);}
function toggleWLCur(){
  if(!curVidData)return;
  const id=curVidData.id,sn=curVidData.snippet||{};
  if(inWL(id)){wLater=wLater.filter(v=>v.id!==id);toast('Dihapus dari Tonton Nanti');G('wl-vbtn').classList.remove('on');}
  else{wLater.unshift({id,title:sn.title,ch:sn.channelTitle,thumb:sn.thumbnails?.medium?.url||'',ts:Date.now()});toast('✅ Ditambah ke Tonton Nanti');G('wl-vbtn').classList.add('on');}
  wLater=wLater.slice(0,100);
  localStorage.setItem('yt_later',JSON.stringify(wLater));
  updBadge();renderWL();
}
function addToWL(id,title,ch,thumb){
  if(inWL(id)){wLater=wLater.filter(v=>v.id!==id);toast('Dihapus dari Tonton Nanti');}
  else{wLater.unshift({id,title,ch,thumb,ts:Date.now()});wLater=wLater.slice(0,100);toast('✅ Ditambah ke Tonton Nanti');}
  localStorage.setItem('yt_later',JSON.stringify(wLater));
  updBadge();
}
function updBadge(){const b=G('wl-badge');if(wLater.length){b.textContent=wLater.length>99?'99+':wLater.length;b.style.display='flex';}else b.style.display='none';}
function renderWL(){
  const l=G('wl-list');
  if(!wLater.length){l.innerHTML='<p style="color:var(--text2);text-align:center;padding:40px 0">Belum ada video disimpan</p>';return;}
  l.innerHTML=wLater.map(v=>`<div class="wlitem" onclick="openWatch('${v.id}');closeWLPanel()">
    <div class="wlthumb">${v.thumb?`<img src="${v.thumb}" loading="lazy" alt=""/>`:''}
    </div><div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(v.title||'')}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">${esc(v.ch||'')}</div>
    </div>
    <button onclick="event.stopPropagation();rmWL('${v.id}')" style="width:26px;height:26px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">✕</button>
  </div>`).join('');
}
function rmWL(id){wLater=wLater.filter(v=>v.id!==id);localStorage.setItem('yt_later',JSON.stringify(wLater));updBadge();renderWL();}
function toggleWLPanel(){G('wlpanel').classList.toggle('open');renderWL();}
function openWLPanel(){G('wlpanel').classList.add('open');renderWL();}
function closeWLPanel(){G('wlpanel').classList.remove('open');}

// ═══════════════════════════════
// NOTES
// ═══════════════════════════════
function loadNote(id){const n=JSON.parse(localStorage.getItem('yt_notes')||'{}');G('notearea').value=n[id]||'';}
function saveNote(){if(!curVidId)return;const n=JSON.parse(localStorage.getItem('yt_notes')||'{}');n[curVidId]=G('notearea').value;localStorage.setItem('yt_notes',JSON.stringify(n));}
function toggleNotes(){const ns=G('notesec');ns.style.display=ns.style.display==='block'?'none':'block';}
function toggleNoteBody(){const b=G('notebody');b.style.display=b.style.display==='block'?'none':'block';}

// ═══════════════════════════════
// SUGGESTIONS (JSONP)
// ═══════════════════════════════
function onSugInput(v){clearTimeout(sugTimer);if(!v||v.length<2){hideSug();return;}sugTimer=setTimeout(()=>fetchSug(v),320);}
function onSugFocus(){const v=G('search-input').value;if(v.length>=2)fetchSug(v);}
function onSugBlur(){setTimeout(hideSug,200);}
function fetchSug(q){
  const cb='_yts_'+Date.now();
  const s=document.createElement('script');
  const t=setTimeout(()=>{hideSug();try{delete window[cb];s.remove();}catch(e){}},3000);
  window[cb]=data=>{clearTimeout(t);try{delete window[cb];s.remove();}catch(e){}
    renderSug(data[1]?data[1].map(x=>Array.isArray(x)?x[0]:x):[]);};
  s.src=`https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&hl=id&q=${encodeURIComponent(q)}&callback=${cb}`;
  s.onerror=()=>{clearTimeout(t);hideSug();};
  document.head.appendChild(s);
}
function renderSug(items){
  const b=G('suggest-box');
  if(!items.length){b.style.display='none';return;}
  b.innerHTML=items.slice(0,8).map(s=>`<div class="sug-item" onmousedown="pickSug('${s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    ${esc(s)}</div>`).join('');
  b.style.display='block';
}
function hideSug(){G('suggest-box').style.display='none';}
function pickSug(s){G('search-input').value=s;hideSug();doSearchTerm(s);}

// ═══════════════════════════════
// CARD RENDERING
// ═══════════════════════════════
function cardH(v,horiz=false){
  const id=v.id?.videoId||v.id;
  const sn=v.snippet||{},st=v.statistics||{},cd=v.contentDetails||{};
  const th=sn.thumbnails?.high?.url||sn.thumbnails?.medium?.url||'';
  const d=dur(cd.duration),views=fv(st.viewCount),ta=sn.publishedAt?ago(sn.publishedAt):'';
  const title=esc(sn.title||''),ch=esc(sn.channelTitle||''),chId=sn.channelId||'';
  const avU=avCache[chId]||'';
  const avC=avc(sn.channelTitle||'');
  const avH=avU?`<img src="${avU}" loading="lazy" alt="" onerror="this.style.display='none'"/>`:((sn.channelTitle||'?')[0].toUpperCase());
  const saved=inWL(id);

  if(horiz)return`<div class="rcard" onclick="openWatch('${id}')">
    <div class="rthumb">${th?`<img src="${th}" loading="lazy" alt=""/>`:''}<span class="rdur">${d}</span></div>
    <div style="flex:1;min-width:0"><div class="rtitle">${title}</div><div class="rch">${ch}</div><div class="rst">${views?views+' penayangan':''}</div></div>
  </div>`;

  return`<div class="vc">
    <div class="vt" onclick="openWatch('${id}')">
      ${th?`<img src="${th}" loading="lazy" alt=""/>`:''}<span class="vdur">${d}</span>
      <button class="vsavebtn" onclick="event.stopPropagation();addToWL('${id}','${title.replace(/'/g,"\\'")}','${ch.replace(/'/g,"\\'")}','${th}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
        ${saved?'Tersimpan':'Simpan'}
      </button>
    </div>
    <div class="vmi">
      <div class="vav" style="background:${avC}" onclick="doSearchTerm('${ch.replace(/'/g,"\\'")}');">${avH}</div>
      <div style="flex:1;min-width:0;cursor:pointer" onclick="openWatch('${id}')">
        <div class="vnm">${title}</div><div class="vch">${ch}</div><div class="vst">${views?views+' penayangan':''}${ta?' · '+ta:''}</div>
      </div>
    </div>
  </div>`;
}

function skelC(){return`<div>
  <div class="sk" style="width:100%;aspect-ratio:16/9;border-radius:12px"></div>
  <div style="display:flex;gap:10px;margin-top:10px">
    <div class="sk" style="width:36px;height:36px;border-radius:50%;flex-shrink:0"></div>
    <div style="flex:1"><div class="sk" style="height:13px;border-radius:4px;margin-bottom:7px;width:90%"></div>
    <div class="sk" style="height:12px;border-radius:4px;margin-bottom:6px;width:60%"></div>
    <div class="sk" style="height:11px;border-radius:4px;width:70%"></div></div>
  </div></div>`;}

// ═══════════════════════════════
// PAGES
// ═══════════════════════════════
function showPg(p){
  G('home-page').style.display=p==='home'?'block':'none';
  G('watch-page').style.display=p==='watch'?'block':'none';
  G('sq-page').style.display=p==='search'?'block':'none';
  if(p!=='watch')closeMini();
}

async function showHome(){
  showPg('home');buildCats();
  const terms=getPersonTerms();
  if(terms.length){
    G('pbanner').style.display='flex';
    G('pbtext').textContent=`Untukmu: ${terms.slice(0,2).join(', ')} dan lainnya`;
    await loadPersonalized(terms);
  }else{
    G('pbanner').style.display='none';
    await loadCat('');
  }
}

async function loadPersonalized(terms){
  const grid=G('grid'),sp=G('spinner');
  sp.style.display='flex';grid.innerHTML='';
  grid.innerHTML=Array(12).fill(0).map(skelC).join('');sp.style.display='none';
  try{
    const qs=[...terms.slice(0,2).map(t=>searchAPI(t,10)),getTrendAPI('',8)];
    const res=await Promise.all(qs);
    const seen=new Set(),merged=[];
    for(const batch of res){for(const v of(batch||[])){const id=v.id?.videoId||v.id;if(!seen.has(id)){seen.add(id);merged.push(v);}}}
    await fetchAv(merged.map(v=>v.snippet?.channelId).filter(Boolean));
    grid.innerHTML=merged.map(v=>cardH(v)).join('');
  }catch(e){grid.innerHTML='';}
}

const CATS=[
  {id:'',l:'Semua'},{id:'10',l:'🎵 Musik'},{id:'20',l:'🎮 Gaming'},
  {id:'25',l:'📰 Berita'},{id:'17',l:'⚽ Olahraga'},{id:'28',l:'💻 Teknologi'},
  {id:'24',l:'🎭 Hiburan'},{id:'22',l:'👤 Vlog'},{id:'1',l:'🎬 Film'},
  {id:'23',l:'😂 Komedi'},{id:'27',l:'📚 Edukasi'},{id:'19',l:'✈️ Travel'}
];

function buildCats(){
  G('cats').innerHTML=CATS.map(c=>`<button class="cpill${c.id===curCat?' on':''}" onclick="loadCat('${c.id}')">${c.l}</button>`).join('');
}

async function loadCat(catId){
  curCat=catId;buildCats();showPg('home');
  const grid=G('grid'),sp=G('spinner');
  sp.style.display='flex';grid.innerHTML='';
  const data=await getTrendAPI(catId,24);
  sp.style.display='none';
  if(!data)return;
  await fetchAv(data.map(v=>v.snippet?.channelId).filter(Boolean));
  grid.innerHTML=data.map(v=>cardH(v)).join('');
  G('pbanner').style.display='none';
}

async function getTrendAPI(catId,max=24){
  const p={part:'snippet,statistics,contentDetails',chart:'mostPopular',maxResults:max,regionCode:'ID'};
  if(catId)p.videoCategoryId=catId;
  const d=await api('videos',p);return d?.items||null;
}

async function searchAPI(q,max=20){
  const d=await api('search',{part:'snippet',q,type:'video',maxResults:max});
  if(!d?.items?.length)return[];
  const ids=d.items.map(i=>i.id.videoId).filter(Boolean).join(',');
  if(!ids)return[];
  const d2=await api('videos',{part:'snippet,statistics,contentDetails',id:ids});
  return d2?.items||[];
}

async function doSearchTerm(q){
  G('search-input').value=q;hideSug();
  showPg('search');window.scrollTo(0,0);
  G('sq-title').innerHTML=`Hasil untuk: <strong style="color:var(--text)">"${esc(q)}"</strong>`;
  const grid=G('sq-grid');
  grid.innerHTML=Array(8).fill(0).map(skelC).join('');
  const items=await searchAPI(q,20);
  await fetchAv(items.map(v=>v.snippet?.channelId).filter(Boolean));
  grid.innerHTML=items.length?items.map(v=>cardH(v)).join(''):`<div class="empty" style="grid-column:1/-1"><p>Tidak ada hasil untuk "${esc(q)}"</p></div>`;
}

function doSearch(e){e.preventDefault();const q=G('search-input').value.trim();if(q)doSearchTerm(q);}

// ═══════════════════════════════
// WATCH
// ═══════════════════════════════
async function openWatch(vid){
  showPg('watch');window.scrollTo(0,0);curVidId=vid;
  G('vtitle').textContent='Memuat...';G('dstats').textContent='';G('dtxt').textContent='';
  G('dtxt').classList.remove('exp');G('dtoggle').textContent='Tampilkan selengkapnya';
  G('lbar-wrap').style.display='none';G('notesec').style.display='none';
  G('wl-vbtn').classList.remove('on');G('lc').textContent='Suka';
  G('chname').textContent='';G('chsubs').textContent='';G('chavatar').innerHTML='';
  G('mini-title').textContent='';
  G('rlist').innerHTML=Array(5).fill(0).map(()=>`<div style="display:flex;gap:8px;margin-bottom:8px">
    <div class="sk" style="width:168px;height:94px;border-radius:8px;flex-shrink:0"></div>
    <div style="flex:1"><div class="sk" style="height:12px;border-radius:4px;margin-bottom:6px;width:90%"></div>
    <div class="sk" style="height:11px;border-radius:4px;width:60%"></div></div></div>`).join('');

  loadP(vid);

  const d=await api('videos',{part:'snippet,statistics,contentDetails',id:vid});
  if(!d?.items?.length)return;
  const v=d.items[0];curVidData=v;
  const sn=v.snippet||{},st=v.statistics||{};

  document.title=`${sn.title||''} - YourTube`;
  G('vtitle').textContent=sn.title||'';
  G('dstats').textContent=`${fvl(st.viewCount)} · ${ago(sn.publishedAt)}`;
  G('dtxt').textContent=sn.description||'';
  G('lc').textContent=fv(st.likeCount)||'Suka';
  G('mini-title').textContent=sn.title||'';

  // Like ratio bar
  if(st.likeCount&&st.viewCount){
    const r=Math.min(100,(parseInt(st.likeCount)/parseInt(st.viewCount))*500);
    G('llike').textContent=`👍 ${fv(st.likeCount)} suka`;
    G('lratio').textContent=`Disukai ${r.toFixed(1)}% penonton`;
    G('lbar-fill').style.width=`${Math.min(100,r*2)}%`;
    G('lbar-wrap').style.display='block';
  }

  if(inWL(vid))G('wl-vbtn').classList.add('on');
  loadNote(vid);

  // Channel
  const chId=sn.channelId;
  G('chname').textContent=sn.channelTitle||'';
  if(chId){
    api('channels',{part:'snippet,statistics',id:chId}).then(cd=>{
      if(!cd?.items?.length)return;
      const ch=cd.items[0];
      G('chsubs').textContent=`${fv(ch.statistics?.subscriberCount||0)} subscriber`;
      const img=ch.snippet?.thumbnails?.medium?.url||ch.snippet?.thumbnails?.default?.url;
      if(img){G('chavatar').innerHTML=`<img src="${img}" alt="" style="width:100%;height:100%;object-fit:cover"/>`;}
      else{G('chavatar').textContent=(sn.channelTitle||'?')[0].toUpperCase();G('chavatar').style.background=avc(sn.channelTitle||'');}
    });
  }

  addHist(v);

  // Related
  const rel=await searchAPI(sn.title||'',12);
  await fetchAv(rel.map(r=>r.snippet?.channelId).filter(Boolean));
  G('rlist').innerHTML=rel.filter(r=>(r.id?.videoId||r.id)!==vid).map(r=>cardH(r,true)).join('');

  setupMiniObs();
}

// ═══════════════════════════════
// MINI PLAYER
// ═══════════════════════════════
function setupMiniObs(){
  if(pObs)pObs.disconnect();
  pObs=new IntersectionObserver(([e])=>{
    if(!curVidId)return;
    if(!e.isIntersecting)showMini();else hideMini();
  },{threshold:0.15});
  pObs.observe(G('pwrap'));
}
function showMini(){
  const mi=G('mini'),inner=G('mini-inner'),pw=G('pwrap'),pe=G('yt-player');
  if(pe&&pw.contains(pe)){inner.appendChild(pe);mi.style.display='flex';miniActive=true;}
}
function hideMini(){
  const mi=G('mini'),inner=G('mini-inner'),pw=G('pwrap'),pe=G('yt-player');
  if(pe&&inner.contains(pe)){pw.insertBefore(pe,pw.firstChild);}
  mi.style.display='none';miniActive=false;
}
function closeMini(){
  if(ytP&&ytP.pauseVideo)ytP.pauseVideo();
  hideMini();curVidId=null;
  if(pObs){pObs.disconnect();pObs=null;}
}
function backToPlayer(){hideMini();G('pwrap').scrollIntoView({behavior:'smooth'});}

// ═══════════════════════════════
// THEATER + FULLSCREEN + LANDSCAPE
// ═══════════════════════════════
function toggleTheater(){
  theaterOn=!theaterOn;
  const pc=G('pcol'),pw=G('pwrap'),rc=G('rcol');
  if(theaterOn){pc.style.flex='1 1 100%';pw.classList.add('theater');rc.style.display='none';G('watch-page').style.padding='0';toast('🎭 Mode Bioskop ON');}
  else{pc.style.flex='';pw.classList.remove('theater');rc.style.display='';G('watch-page').style.padding='16px 16px 40px';toast('Mode Bioskop OFF');}
}

async function goFS(){
  const el=G('pwrap');
  try{
    if(el.requestFullscreen)await el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    else if(el.mozRequestFullScreen)el.mozRequestFullScreen();
  }catch(e){console.warn(e);}
}

async function lockLandscape(){
  try{await screen.orientation.lock('landscape');toast('📱 Landscape aktif');}catch(e){}
}
function unlockOrientation(){try{screen.orientation.unlock();}catch(e){}}

document.addEventListener('fullscreenchange',()=>{if(document.fullscreenElement)lockLandscape();else unlockOrientation();});
document.addEventListener('webkitfullscreenchange',()=>{if(document.webkitFullscreenElement)lockLandscape();else unlockOrientation();});

// ═══════════════════════════════
// REPEAT + DESC + SHARE
// ═══════════════════════════════
function toggleRep(){autoRep=!autoRep;G('rep-btn').style.background=autoRep?'rgba(255,0,0,.35)':'';toast(autoRep?'🔁 Putar Ulang ON':'Putar Ulang OFF');}
function toggleDesc(){const el=G('dtxt');const e=el.classList.toggle('exp');G('dtoggle').textContent=e?'Tampilkan lebih sedikit':'Tampilkan selengkapnya';}
function shareVid(){
  const url=`https://youtu.be/${curVidId}`;
  if(navigator.share)navigator.share({title:G('vtitle').textContent,url});
  else if(navigator.clipboard)navigator.clipboard.writeText(url).then(()=>toast('🔗 Link disalin!'));
  else toast('Link: '+url);
}

// ═══════════════════════════════
// THEME + SIDEBAR
// ═══════════════════════════════
function toggleTheme(){document.body.classList.toggle('light');const l=document.body.classList.contains('light');localStorage.setItem('yt_theme',l?'light':'dark');toast(l?'☀️ Mode Terang':'🌙 Mode Gelap');}
function toggleSidebar(){
  sideExp=!sideExp;
  const sb=G('sidebar'),mn=G('main');
  if(sideExp){sb.classList.add('exp');mn.classList.add('exp');}
  else{sb.classList.remove('exp');mn.classList.remove('exp');}
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('yt_theme')==='light')document.body.classList.add('light');
  if(sideExp){G('sidebar').classList.add('exp');G('main').classList.add('exp');}
  updBadge();
  showHome();
});
</script>
