<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0" id="vp-meta"/>
<title>YourTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--surface:#272727;--surface2:#3d3d3d;--border:#3d3d3d;--text:#f1f1f1;--text2:#aaa;--red:#ff0000;--blue:#3ea6ff;--nav-h:56px;--side-w:72px;--side-full:240px}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Roboto',Arial,sans-serif;font-size:14px;overflow-x:hidden;transition:background .3s,color .3s}
body.light{--bg:#fff;--surface:#f2f2f2;--surface2:#e5e5e5;--border:#ddd;--text:#0f0f0f;--text2:#606060}
a{color:inherit;text-decoration:none}
button{background:none;border:none;cursor:pointer;color:inherit;font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#606060;border-radius:3px}

/* NAV */
#navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--bg);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:300;transition:background .3s}
#logo-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative}
.icon-btn:hover{background:var(--surface)}
.icon-btn svg{width:22px;height:22px}
#logo-svg{cursor:pointer;display:flex;align-items:center;gap:4px}
.logo-txt{font-size:18px;font-weight:700;letter-spacing:-0.5px}

/* search */
#search-wrap{flex:1;max-width:580px;margin:0 auto;position:relative}
#search-row{display:flex}
#search-input{flex:1;padding:8px 16px;background:#121212;color:var(--text);border:1px solid var(--border);border-right:none;border-radius:40px 0 0 40px;outline:none;font-size:15px;min-width:0;}
body.light #search-input{background:#f8f8f8}
#search-input:focus{border-color:var(--blue)}
#search-btn{width:52px;background:var(--surface);border:1px solid var(--border);border-radius:0 40px 40px 0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#search-btn:hover{background:var(--surface2)}
#suggest-box{position:absolute;top:calc(100% + 4px);left:0;right:52px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;z-index:400;display:none;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.sug-item{padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:var(--text)}
.sug-item:hover{background:var(--surface2)}
.sug-item svg{flex-shrink:0;opacity:.5;width:16px;height:16px}

/* nav right */
#nav-right{display:flex;align-items:center;gap:4px;flex-shrink:0}

/* SIDEBAR */
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:90;}
#sb-overlay.show{display:block;}
#sidebar{position:fixed;top:var(--nav-h);left:0;bottom:0;width:var(--side-w);background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:8px 0;z-index:100;overflow-y:auto;overflow-x:hidden;transition:width .25s, transform .3s, background .3s;scrollbar-width:none}
#sidebar.exp{width:var(--side-full);align-items:flex-start}
#sidebar::-webkit-scrollbar{display:none}
.si{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 0;width:100%;cursor:pointer;border-radius:10px;font-size:10px;color:var(--text2);transition:background .15s}
.si:hover,.si.on{background:var(--surface);color:var(--text)}
.si svg{width:22px;height:22px;flex-shrink:0}
#sidebar.exp .si{flex-direction:row;padding:10px 16px;gap:20px;font-size:14px;align-items:center}
#sidebar.exp .si.on{font-weight:600}
.sdiv{width:40px;height:1px;background:var(--border);margin:6px 0;flex-shrink:0}
#sidebar.exp .sdiv{width:calc(100% - 32px);margin:6px 16px}
.slabel{display:none;font-size:14px;font-weight:600;padding:8px 16px;width:100%}
#sidebar.exp .slabel{display:block}

/* MAIN */
#main{margin-top:var(--nav-h);margin-left:var(--side-w);transition:margin-left .25s;min-height:calc(100vh - var(--nav-h))}
#main.exp{margin-left:var(--side-full)}
.page-sec{display:none; padding:16px; max-width:1800px; margin:0 auto;}
#home-page{padding:0;}

/* CATS */
#cats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--nav-h);background:var(--bg);z-index:50;transition:background .3s}
#cats::-webkit-scrollbar{display:none}
.cpill{flex-shrink:0;padding:6px 12px;border-radius:8px;background:var(--surface);color:var(--text);border:none;cursor:pointer;font-size:14px;font-weight:500;transition:background .15s;white-space:nowrap}
.cpill:hover{background:var(--surface2)}
.cpill.on{background:var(--text);color:var(--bg)}

/* GRID */
#grid,#sq-grid,#ch-grid,#hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:8px 16px 40px}

/* VIDEO CARD */
.vc{cursor:pointer}
.vt{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:#000}
.vt img{width:100%;height:100%;object-fit:cover;transition:transform .3s;display:block}
.vc:hover .vt img{transform:scale(1.04)}
.vdur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:12px;font-weight:600;padding:2px 6px;border-radius:4px}
.vsavebtn{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.75);color:#fff;border-radius:4px;padding:4px 8px;font-size:11px;display:none;align-items:center;gap:4px;border:none;cursor:pointer}
.vt:hover .vsavebtn{display:flex}
.vmi{display:flex;gap:10px;margin-top:10px;align-items:flex-start}
.vav{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;cursor:pointer}
.vav img{width:100%;height:100%;object-fit:cover}
.vnm{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vch{font-size:13px;color:var(--text2);margin-top:2px}
.vst{font-size:13px;color:var(--text2)}

/* SKELETON */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}

/* WATCH PAGE */
#wlayout{display:flex;gap:20px;flex-wrap:wrap}
#pcol{flex:1 1 600px;min-width:0;transition:flex .3s}

/* PLAYER & MINI PLAYER FIX */
#pwrap-container{position:relative;width:100%;padding-top:56.25%;border-radius:12px;background:#000;overflow:visible;}
#pwrap-container.theater{border-radius:0;margin:0 -16px;width:calc(100% + 32px)}
#pwrap{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;border-radius:inherit;overflow:hidden;transition:border-radius .3s, box-shadow .3s;}
#yt-player,#pwrap iframe{width:100%;height:100%;border:none;display:block;}

/* Audio Mode Overlay */
#audio-overlay{position:absolute;inset:0;background:#000;z-index:15;display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#fff;}
#audio-overlay svg{width:48px;height:48px;color:var(--blue);margin-bottom:12px;}

/* GLOBAL MINI PLAYER CONTAINER */
#global-mini{position:fixed;bottom:20px;right:20px;width:320px;background:#1a1a1a;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.8);z-index:999;display:none;flex-direction:column;overflow:hidden;cursor:pointer;}
#global-mini-vid{width:100%;aspect-ratio:16/9;background:#000;}
#mini-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#121212;border-top:1px solid #333;}
#mini-title{font-size:12px;color:#eee;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.mini-btn{background:none;border:none;color:#aaa;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mini-btn:hover{color:#fff;}
.mini-btn svg{width:24px;height:24px;}

/* player overlay controls */
#pctrl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:8px 12px 12px;display:flex;align-items:center;gap:6px;opacity:0;transition:opacity .2s;z-index:10;flex-wrap:wrap;pointer-events:none;}
#pwrap:hover #pctrl{opacity:1}
#pctrl > * {pointer-events:auto;} 

.pb{background:none;border:none;color:#fff;cursor:pointer;padding:4px 5px;border-radius:5px;display:flex;align-items:center;flex-shrink:0}
.pb:hover{background:rgba(255,255,255,.18)}
.pb svg{width:22px;height:22px}
.psel{background:rgba(0,0,0,.65);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 7px;font-size:13px;cursor:pointer;font-family:inherit}
.psp{flex:1}

/* video info */
#vtitle{font-size:20px;font-weight:600;margin:14px 0 8px;line-height:1.4}
#lbar-wrap{display:none;margin-bottom:10px}
#lbar-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px}
#lbar{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
#lbar-fill{height:100%;background:var(--blue);transition:width .6s;border-radius:99px}
#vmeta{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px}
#chinfo{display:flex;align-items:center;gap:10px;flex:1;min-width:200px;cursor:pointer;}
#chavatar{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px}
#chavatar img{width:100%;height:100%;object-fit:cover}
#subbtn{padding:10px 16px;background:var(--text);color:var(--bg);border-radius:9999px;font-weight:600;font-size:14px;cursor:pointer}
#abtns{display:flex;gap:7px;flex-wrap:wrap}
.ab{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:9999px;background:var(--surface);font-size:13px;font-weight:500;transition:background .15s;white-space:nowrap;cursor:pointer}
.ab:hover,.ab.on{background:var(--surface2)}
.ab.on{background:var(--text);color:var(--bg)}
.ab svg{width:18px;height:18px;flex-shrink:0}

/* desc box */
#dbox{background:var(--surface);border-radius:12px;padding:14px;margin-top:10px;transition:background .3s}
#dtxt{font-size:14px;line-height:1.6;white-space:pre-wrap;max-height:72px;overflow:hidden;transition:max-height .4s}
#dtxt.exp{max-height:2000px}

/* related */
#rcol{flex:0 0 360px;min-width:0}
.rcard{display:flex;gap:8px;margin-bottom:8px;cursor:pointer;padding:4px;border-radius:8px;transition:background .15s}
.rcard:hover{background:var(--surface)}
.rthumb{position:relative;flex-shrink:0;width:168px;height:94px;border-radius:8px;overflow:hidden;background:#000}
.rthumb img{width:100%;height:100%;object-fit:cover;display:block}
.rdur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;font-weight:600;padding:1px 4px;border-radius:3px}
.rtitle{font-size:13px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* CHANNEL PAGE */
#ch-banner{width:100%;height:200px;background:#333;border-radius:16px;overflow:hidden;margin-bottom:24px;}
#ch-banner img{width:100%;height:100%;object-fit:cover;}
#ch-hdr{display:flex;gap:24px;align-items:center;margin-bottom:32px;}
#ch-big-av{width:128px;height:128px;border-radius:50%;overflow:hidden;background:var(--surface);flex-shrink:0;}
#ch-big-av img{width:100%;height:100%;object-fit:cover;}

/* PLAYLIST PANEL */
#pl-panel{position:fixed;top:var(--nav-h);right:-380px;width:360px;bottom:0;background:var(--bg);border-left:1px solid var(--border);z-index:250;transition:right .3s,background .3s;display:flex;flex-direction:column;}
#pl-panel.open{right:0}
.pl-hdr{padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;}
.pl-sel{background:var(--surface); color:var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:8px; outline:none; font-size:15px; font-weight:600; cursor:pointer;}
#wl-list{flex:1; overflow-y:auto; padding:16px;}
.wlitem{display:flex;gap:8px;margin-bottom:10px;cursor:pointer;padding:6px;border-radius:8px;transition:background .15s;align-items:flex-start}
.wlitem:hover{background:var(--surface)}
.wlthumb{width:100px;aspect-ratio:16/9;border-radius:6px;overflow:hidden;background:#000;flex-shrink:0}
.wlthumb img{width:100%;height:100%;object-fit:cover;display:block}

/* MODAL PLAYLIST */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:16px}
.moverlay.show{display:flex}
.mbox{background:#1a1a1a;border:1px solid var(--border);border-radius:16px;padding:24px;max-width:400px;width:100%}
body.light .mbox{background:#fff;}
.minput{width:100%;padding:12px 14px;background:#0f0f0f;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
body.light .minput{background:#f8f8f8;}
.mbtn{width:100%;padding:12px;background:var(--blue);color:#fff;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;border:none}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:10px 20px;border-radius:9999px;font-size:14px;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

/* EMPTY / ERR */
.empty{text-align:center;padding:80px 20px;color:var(--text2)}

/* RESPONSIVE & MOBILE FIX */
@media(max-width:640px){
  #navbar {padding: 0 8px; gap:4px;}
  .logo-txt {display:none;} /* Sembunyikan tulisan YourTube biar search bar lega */
  #search-input {padding: 8px 12px; font-size:14px; border-radius: 40px;}
  #search-btn {border-radius: 0 40px 40px 0; width: 44px; position:absolute; right:0; top:0; bottom:0;}
  #search-wrap {max-width: none; flex:1;}
  #suggest-box {position:fixed; top:56px; left:0; right:0; width:100vw; border-radius:0; border-left:none; border-right:none;}

  #main{margin-left:0!important}
  
  /* Sidebar Mobile Drawer */
  #sidebar {display:flex; transform:translateX(-100%); position:fixed; z-index:1000; top:var(--nav-h); bottom:0; width:240px; align-items:flex-start; box-shadow:none;}
  #sidebar.exp {transform:translateX(0); box-shadow:4px 0 24px rgba(0,0,0,0.6);}
  #sidebar .si {flex-direction:row; padding:12px 16px; gap:20px; font-size:14px;}
  #sidebar .slabel {display:block;}
  #sidebar .sdiv {width:calc(100% - 32px); margin:6px 16px;}
  
  /* Fix Grid Kepotong */
  #grid, #sq-grid, #ch-grid, #hist-grid {display:block; padding:0;}
  .vc {margin-bottom:24px; display:block;}
  .vt {border-radius:0;}
  .vmi {padding:0 12px;}
  .page-sec {padding:0 0 40px 0;}
  
  #wlayout{flex-direction:column; gap:0;}
  #pwrap-container {border-radius:0;}
  #vtitle, #vmeta, #dbox, #notesec {margin-left:12px; margin-right:12px;}
  #rcol{flex:none;width:100%; padding: 0 12px;}
  
  #pl-panel{width:100%;right:-100%}
  #pctrl{flex-wrap:wrap}

  #ch-hdr {flex-direction:column; text-align:center; gap:12px; margin-top:16px;}
  #ch-banner {border-radius:0;}
  
  #global-mini {width:100%; bottom:0; right:0; border-radius:0;}
}
</style>
</head>
<body>

<nav id="navbar">
  <div id="logo-wrap">
    <button class="icon-btn" onclick="toggleSidebar()" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <div id="logo-svg" onclick="nav('home')">
      <svg height="20" viewBox="0 0 120 20" style="width:28px;overflow:visible">
        <path d="M27.97 3.12C27.64 1.89 26.68.93 25.45.6 23.22 0 14.28 0 14.28 0S5.35 0 3.12.6C1.89.93.93 1.89.6 3.12 0 5.35 0 10 0 10s0 4.65.6 6.88c.33 1.23 1.29 2.19 2.52 2.52C5.35 20 14.28 20 14.28 20s8.93 0 11.17-.6c1.23-.33 2.19-1.29 2.52-2.52C28.57 14.65 28.57 10 28.57 10s0-4.65-.6-6.88z" fill="#FF0000"/>
        <path d="M11.43 14.29L18.86 10l-7.43-4.29v8.58z" fill="white"/>
      </svg>
      <span class="logo-txt">YourTube</span>
    </div>
  </div>

  <div id="search-wrap">
    <form onsubmit="doSearch(event)" autocomplete="off" style="position:relative">
      <div id="search-row">
        <input id="search-input" type="text" placeholder="Cari video..." oninput="onSugInput(this.value)" onfocus="onSugFocus()" onblur="onSugBlur()"/>
        <button id="search-btn" type="submit">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#aaa"><path d="M20.87 20.17l-5.59-5.59C16.35 13.35 17 11.75 17 10c0-3.87-3.13-7-7-7s-7 3.13-7 7 3.13 7 7 7c1.75 0 3.35-.65 4.58-1.71l5.59 5.59.7-.71zM10 16c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
        </button>
      </div>
      <div id="suggest-box"></div>
    </form>
  </div>

  <div id="nav-right">
    <button class="icon-btn" onclick="togglePLPanel()" title="Koleksi Playlist">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
    </button>
    <button class="icon-btn" onclick="toggleTheme()" title="Ganti Tema">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>
  </div>
</nav>

<div id="sb-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
  <div class="si on" id="sb-home" onclick="nav('home')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Beranda</span>
  </div>
  <div class="si" onclick="nav('search','shorts viral')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.77 10.32l-1.2-.5L18 9l.5-1.2.5 1.2 1.2.5-1.2.5L18 11.2l-.23-.88zM3 9l2.93 7h1.76l1.44-3.39L10.56 16h1.76L15.26 9h-1.7l-1.45 3.48L10.56 9H8.81l-1.45 3.48L5.91 9H3z"/></svg>
    <span>Shorts</span>
  </div>
  <div class="si" onclick="nav('history')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
    <span>Riwayat</span>
  </div>
  <div class="si" onclick="openPLPanel()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
    <span>Koleksi</span>
  </div>
  <div class="sdiv"></div>
  <div class="slabel">Jelajahi</div>
  <div class="si" onclick="loadCat('')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.2 10H14L17 3H11v8H8l6.8 9z"/></svg>
    <span>Trending</span>
  </div>
  <div class="si" onclick="nav('search','musik indonesia terbaru')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    <span>Musik</span>

<script>
// ═══════════════════════════════

const API_KEY = 'AIzaSyDGL07gZV6q40NEsSJ_oA4vaT84est1dXM';

let sideExp=window.innerWidth>1024;

function avc(s){let h=0;for(let c of(s||''))h=(h*31+c.charCodeAt(0))&0xffffffff;return AVC[Math.abs(h)%AVC.length];}
function fv(n){if(!n)return'0';n=parseInt(n);if(n>=1e9)return(n/1e9).toFixed(1)+'M';if(n>=1e6)return(n/1e6).toFixed(1)+'jt';if(n>=1e3)return(n/1e3).toFixed(0)+'rb';return n.toString();}
function fvl(n){if(!n)return'0 penayangan';n=parseInt(n);return n.toLocaleString('id')+' penayangan';}
function ago(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'baru saja';const m=Math.floor(s/60);if(m<60)return m+'m lalu';const h=Math.floor(m/60);if(h<24)return h+' jam lalu';const dy=Math.floor(h/24);if(dy<7)return dy+' hari lalu';const w=Math.floor(dy/7);if(w<5)return w+' minggu lalu';const mo=Math.floor(dy/30);if(mo<12)return mo+' bulan lalu';return Math.floor(dy/365)+' tahun lalu';}
function dur(d){if(!d)return'';const m=d.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);if(!m)return'';const h=parseInt(m[1]||0),mn=parseInt(m[2]||0),s=parseInt(m[3]||0);if(h>0)return`${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`;return`${mn}:${String(s).padStart(2,'0')}`;}
function esc(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function api(ep,p){
  p.key=API_KEY; const url=`${BASE}/${ep}?`+new URLSearchParams(p);
  try{const r=await fetch(url),d=await r.json();if(d.error){toast('⚠️ API error');return null;}return d;}
  catch(e){return null;}
}
async function fetchAv(ids){
  const miss=[...new Set(ids)].filter(id=>!avCache[id]&&id);
  if(!miss.length)return;
  for(let i=0;i<miss.length;i+=50){
    const d=await api('channels',{part:'snippet',id:miss.slice(i,i+50).join(','),maxResults:50});
    if(d?.items)d.items.forEach(ch=>{avCache[ch.id]=ch.snippet?.thumbnails?.default?.url||'';});
  }

function nav(page, arg){
  const state = {page, arg};
  history.pushState(state, '', `#${page}${arg?('='+encodeURIComponent(arg)):''}`);
  handleRoute(state);
}

window.addEventListener('popstate', (e) => {
  handleRoute(e.state || {page:'home'});
});

function handleRoute(state){
  if(window.innerWidth<=640 && G('sidebar').classList.contains('exp')) toggleSidebar();
  
  // Sembunyikan semua page
  document.querySelectorAll('.page-sec').forEach(el=>el.style.display='none');
  window.scrollTo(0,0);

  // Cek Global Mini Player
  if(state.page !== 'watch' && curVidId && ytP) {
    showGlobalMini();
  } else {
    hideGlobalMini();
  }

  if(state.page === 'home') {
    G('home-page').style.display='block';
    if(!G('grid').innerHTML) showHome();
  } 
  else if(state.page === 'watch') {
    G('watch-page').style.display='block';
    if(curVidId !== state.arg) openWatch(state.arg);
  }
  else if(state.page === 'channel') {
    G('channel-page').style.display='block';
    openChannel(state.arg);
  }
  else if(state.page === 'search') {
    G('sq-page').style.display='block';
    doSearchTerm(state.arg, true);
  }
  else if(state.page === 'history') {
    G('hist-page').style.display='block';
    showHistory();
  }
}

function showGlobalMini(){
  const pe = G('yt-player'), c = G('global-mini-vid');
  if(pe && !c.contains(pe)) c.appendChild(pe);
  G('global-mini').style.display = 'flex';
}
function hideGlobalMini(){
  const pe = G('yt-player'), c = G('pwrap');
  if(pe && !c.contains(pe)) c.insertBefore(pe, c.firstChild);
  G('global-mini').style.display = 'none';
}

  if(ytP&&ytP.pauseVideo) ytP.pauseVideo();
  hideGlobalMini();
  curVidId = null;
}

// ═══════════════════════════════
// YT PLAYER & RESUME TIME
// ═══════════════════════════════
window.onYouTubeIframeAPIReady=function(){ytReady=true;if(pendVid){loadP(pendVid);pendVid=null;}};

function loadP(vid){
  if(!ytReady){pendVid=vid;return;}
  hideGlobalMini(); 
  
  let savedTime = localStorage.getItem('ytt_'+vid);

  if(ytP){
    ytP.loadVideoById(vid, savedTime ? parseFloat(savedTime) : 0);
    return;
  }
  
  ytP=new YT.Player('yt-player',{
    host: 'https://www.youtube.com', 
    videoId:vid,
    playerVars:{ autoplay:1, rel:0, modestbranding:1, playsinline:1, enablejsapi:1 },
    events:{
      onReady(e){
        e.target.setPlaybackRate(curSpd);
        if(savedTime) e.target.seekTo(parseFloat(savedTime));
      },
      onStateChange(e){
        if(e.data===YT.PlayerState.ENDED&&autoRep) ytP.seekTo(0);
        // Track Watch Time
        if(e.data===YT.PlayerState.PLAYING){
          if(timeTracker) clearInterval(timeTracker);
          timeTracker = setInterval(()=>{
            if(ytP && ytP.getCurrentTime && curVidId) localStorage.setItem('ytt_'+curVidId, ytP.getCurrentTime());
          }, 3000);
        } else {
          if(timeTracker) clearInterval(timeTracker);
        }
      }
    }
  });
}

function yc(cmd){if(ytP&&ytP[cmd])ytP[cmd]();}
function setSpd(v){curSpd=parseFloat(v);if(ytP)ytP.setPlaybackRate(curSpd);}
function setCap(lang){
  if(!ytP)return;
  try{
    if(!lang){ytP.unloadModule&&ytP.unloadModule('captions');}
    else{ytP.loadModule&&ytP.loadModule('captions');ytP.setOption&&ytP.setOption('captions','track',{languageCode:lang});}
  }catch(e){}
}
function toggleAudioMode(){
  audioMode=!audioMode;
  const ov = G('audio-overlay');
  if(audioMode){ov.style.display='flex';toast('🎧 Mode Audio Aktif');}
  else{ov.style.display='none';}
}

  wHist.unshift({id,title:v.snippet?.title,ch:v.snippet?.channelTitle,chId:v.snippet?.channelId,thumb:v.snippet?.thumbnails?.medium?.url||'',ts:Date.now()});

  grid.innerHTML = wHist.map(v=>cardH({id:v.id, snippet:{title:v.title, channelTitle:v.ch, channelId:v.chId, thumbnails:{medium:{url:v.thumb}}}})).join('');

  const avU=avCache[chId]||''; const avC=avc(ch);
  const avH=avU?`<img src="${avU}" loading="lazy"/>`:((ch||'?')[0].toUpperCase());

  if(horiz)return`<div class="rcard" onclick="nav('watch','${id}')">

        <div class="vnm">${title}</div><div class="vch">${ch}</div><div class="vst">${views?views+' penayangan':''}${ta?' · '+ta:''}</div>
      </div>
    </div>
  </div>`;
}

async function showHome(){
  buildCats();
  const terms=wHist.slice(0,20).reduce((acc, v)=>{if(v.ch) acc[v.ch]=(acc[v.ch]||0)+1; return acc;}, {});
  const top = Object.entries(terms).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);
  if(top.length) await loadPersonalized(top); else await loadCat('');
}

async function loadPersonalized(terms){
  const grid=G('grid'); grid.innerHTML=Array(12).fill(0).map(skelC).join('');
  try{
    const qs=[...terms.map(t=>searchAPI(t,10)),getTrendAPI('',8)];
    const res=await Promise.all(qs);
    const seen=new Set(),merged=[];
    for(const batch of res){for(const v of(batch||[])){const id=v.id?.videoId||v.id;if(!seen.has(id)){seen.add(id);merged.push(v);}}}
    await fetchAv(merged.map(v=>v.snippet?.channelId).filter(Boolean));
    grid.innerHTML=merged.map(v=>cardH(v)).join('');
  }catch(e){grid.innerHTML='';}
}

const CATS=[{id:'',l:'Semua'},{id:'10',l:'🎵 Musik'},{id:'20',l:'🎮 Gaming'},{id:'25',l:'📰 Berita'},{id:'17',l:'⚽ Olahraga'},{id:'28',l:'💻 Teknologi'}];
function buildCats(){G('cats').innerHTML=CATS.map(c=>`<button class="cpill${c.id===curCat?' on':''}" onclick="loadCat('${c.id}')">${c.l}</button>`).join('');}

async function loadCat(catId){
  curCat=catId;buildCats(); const grid=G('grid');
  grid.innerHTML=Array(12).fill(0).map(skelC).join('');
  const data=await getTrendAPI(catId,24);
  if(!data)return;
  await fetchAv(data.map(v=>v.snippet?.channelId).filter(Boolean));
  grid.innerHTML=data.map(v=>cardH(v)).join('');
}
async function getTrendAPI(c,m){const d=await api('videos',{part:'snippet,statistics,contentDetails',chart:'mostPopular',maxResults:m,regionCode:'ID',...(c?{videoCategoryId:c}:{})}); return d?.items||null;}
async function searchAPI(q,m){const d=await api('search',{part:'snippet',q,type:'video',maxResults:m}); if(!d?.items?.length)return[]; const i=d.items.map(x=>x.id.videoId).join(','); return (await api('videos',{part:'snippet,statistics,contentDetails',id:i}))?.items||[];}

async function doSearchTerm(q, isRouted){
  if(!isRouted) return nav('search', q); // Route it if called directly
  G('search-input').value=q; sHist=sHist.filter(x=>x!==q); sHist.unshift(q); localStorage.setItem('yt_shist',JSON.stringify(sHist.slice(0,10)));
  G('sq-title').innerHTML=`Hasil untuk: <strong style="color:var(--text)">"${esc(q)}"</strong>`;
  const grid=G('sq-grid'); grid.innerHTML=Array(8).fill(0).map(skelC).join('');
  const items=await searchAPI(q,20); await fetchAv(items.map(v=>v.snippet?.channelId).filter(Boolean));
  grid.innerHTML=items.length?items.map(v=>cardH(v)).join(''):`<div class="empty">Tidak ada hasil</div>`;
}

// NEW: CHANNEL PAGE

async function openChannel(chId){
  if(!chId) return nav('home');
  G('ch-banner').innerHTML = ''; G('ch-big-av').innerHTML = '';
  G('ch-big-name').textContent = 'Memuat...'; G('ch-big-subs').textContent = '';
  G('ch-grid').innerHTML=Array(8).fill(0).map(skelC).join('');
  
  const d = await api('channels', {part:'snippet,brandingSettings,statistics', id:chId});
  if(!d?.items?.length) return;
  const ch = d.items[0], sn = ch.snippet, st = ch.statistics, bs = ch.brandingSettings;
  
  if(bs?.image?.bannerExternalUrl) G('ch-banner').innerHTML = `<img src="${bs.image.bannerExternalUrl}"/>`;
  if(sn?.thumbnails?.high?.url) G('ch-big-av').innerHTML = `<img src="${sn.thumbnails.high.url}"/>`;
  
  G('ch-big-name').textContent = sn?.title || '';
  G('ch-big-subs').textContent = `${fv(st?.subscriberCount||0)} subscriber · ${fv(st?.videoCount||0)} video`;
  
  // Cache av biar pas render cardH muncul
  if(sn?.thumbnails?.default?.url) avCache[chId] = sn.thumbnails.default.url;
  
  const vids = await api('search', {part:'snippet', channelId:chId, order:'date', type:'video', maxResults:16});
  if(!vids?.items?.length) { G('ch-grid').innerHTML = '<div class="empty">Tidak ada video</div>'; return;}
  
  const ids = vids.items.map(i=>i.id.videoId).join(',');
  const vDetails = await api('videos', {part:'snippet,statistics,contentDetails', id:ids});
  
  G('ch-grid').innerHTML = vDetails?.items?.map(v=>cardH(v)).join('') || '';
}

async function openWatch(vid){
  curVidId=vid; audioMode=false; G('audio-overlay').style.display='none';
  G('vtitle').textContent='Memuat...'; G('chname').textContent=''; G('mini-title').textContent='Memuat...';
  G('rlist').innerHTML=Array(5).fill(0).map(()=>`<div style="display:flex;gap:8px;margin-bottom:8px"><div class="sk" style="width:168px;height:94px;border-radius:8px;flex-shrink:0"></div><div style="flex:1"><div class="sk" style="height:12px;border-radius:4px;margin-bottom:6px;width:90%"></div></div></div>`).join('');
  loadP(vid);

  const d=await api('videos',{part:'snippet,statistics,contentDetails',id:vid});
  if(!d?.items?.length)return;
  const v=d.items[0], sn=v.snippet, st=v.statistics;

  document.title=`${sn.title} - YourTube`;
  G('vtitle').textContent=sn.title; G('dstats').textContent=`${fvl(st.viewCount)} · ${ago(sn.publishedAt)}`;
  G('dtxt').textContent=sn.description||''; G('lc').textContent=fv(st.likeCount)||'Suka';
  G('mini-title').textContent=sn.title;

  G('chinfo').dataset.chid = sn.channelId;

  if(st.likeCount&&st.viewCount){
    const r=Math.min(100,(parseInt(st.likeCount)/parseInt(st.viewCount))*500);
    G('lbar-fill').style.width=`${Math.min(100,r*2)}%`; G('lbar-wrap').style.display='block';
  }
  
  const chId=sn.channelId; G('chname').textContent=sn.channelTitle;
  if(chId){
    api('channels',{part:'snippet,statistics',id:chId}).then(cd=>{
      if(!cd?.items?.length)return; const c=cd.items[0];
      G('chsubs').textContent=`${fv(c.statistics?.subscriberCount||0)} sub`;
      const img=c.snippet?.thumbnails?.medium?.url;
      if(img)G('chavatar').innerHTML=`<img src="${img}"/>`; else{G('chavatar').textContent=sn.channelTitle[0].toUpperCase();G('chavatar').style.background=avc(sn.channelTitle);}
    });
  }

  addHist(v);
  const rel=await searchAPI(sn.title,12); await fetchAv(rel.map(r=>r.snippet?.channelId).filter(Boolean));
  G('rlist').innerHTML=rel.filter(r=>(r.id?.videoId||r.id)!==vid).map(r=>cardH(r,true)).join('');
}

function openSaveModalCur(){if(curVidData)openSaveModal(curVidData.id,curVidData.snippet.title,curVidData.snippet.channelTitle,curVidData.snippet.thumbnails?.medium?.url);}
function openSaveModal(id,title,ch,thumb){
  const m=G('pl-modal'); m.dataset.vid=id; m.dataset.vtitle=title; m.dataset.vch=ch; m.dataset.vthumb=thumb;
  let html='';
  for(let p in playlists){
    let c=playlists[p].some(v=>v.id===id);
    html+=`<label style="display:flex;align-items:center;gap:12px;margin-bottom:12px;cursor:pointer"><input type="checkbox" style="width:18px;height:18px" ${c?'checked':''} onchange="togglePlItem('${p}','${id}','${esc(title)}','${esc(ch)}','${thumb}',this.checked)">${esc(p)}</label>`;
  }
  G('pl-list-modal').innerHTML=html; m.classList.add('show');
}
function togglePlItem(p,id,t,c,th,chk){
  if(chk){if(!playlists[p].some(v=>v.id===id)){playlists[p].unshift({id,title:t,ch:c,thumb:th});toast(`Masuk ke ${p}`);}}
  else{playlists[p]=playlists[p].filter(v=>v.id!==id);toast(`Dihapus dari ${p}`);}
  localStorage.setItem('yt_playlists',JSON.stringify(playlists)); if(G('pl-panel').classList.contains('open'))renderPL();
}
function createNewPl(){
  let n=G('new-pl-inp').value.trim(); if(!n||playlists[n])return;
  playlists[n]=[]; G('new-pl-inp').value='';
  const m=G('pl-modal'); togglePlItem(n,m.dataset.vid,m.dataset.vtitle,m.dataset.vch,m.dataset.vthumb,true);
  openSaveModal(m.dataset.vid,m.dataset.vtitle,m.dataset.vch,m.dataset.vthumb);
}
function renderPL(){
  G('pl-select').innerHTML=Object.keys(playlists).map(p=>`<option value="${p}" ${p===curPlView?'selected':''}>${esc(p)}</option>`).join('');
  const i=playlists[curPlView]||[];
  G('wl-list').innerHTML=i.length?i.map(v=>`<div class="wlitem" onclick="nav('watch','${v.id}');closePLPanel()"><div class="wlthumb"><img src="${v.thumb}"/></div><div style="flex:1"><div style="font-size:13px;font-weight:500;overflow:hidden">${esc(v.title)}</div><div style="font-size:12px;color:#aaa">${esc(v.ch)}</div></div><button onclick="event.stopPropagation();playlists['${curPlView}']=playlists['${curPlView}'].filter(x=>x.id!=='${v.id}');localStorage.setItem('yt_playlists',JSON.stringify(playlists));renderPL()" style="width:26px;height:26px;border-radius:50%;background:var(--surface);color:#fff;border:none">✕</button></div>`).join(''):'<div class="empty">Kosong</div>';
}
function togglePLPanel(){G('pl-panel').classList.toggle('open');renderPL();}
function openPLPanel(){if(window.innerWidth<=640)toggleSidebar();G('pl-panel').classList.add('open');renderPL();}
function closePLPanel(){G('pl-panel').classList.remove('open');}
function bgClose(e,id){if(e.target===G(id))G(id).classList.remove('show');}
function toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('yt_theme',document.body.classList.contains('light')?'light':'dark');}
function toggleSidebar(){
  const sb=G('sidebar'),mn=G('main'),ov=G('sb-overlay');
  if(window.innerWidth<=640){sb.classList.toggle('exp');ov.classList.toggle('show',sb.classList.contains('exp'));}
  else{sideExp=!sideExp;sb.classList.toggle('exp',sideExp);mn.classList.toggle('exp',sideExp);}
}

// Init Router
document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('yt_theme')==='light')document.body.classList.add('light');
  if(sideExp && window.innerWidth>640){G('sidebar').classList.add('exp');G('main').classList.add('exp');}
  
  // Baca URL hash saat web dibuka
  const hash = window.location.hash.substring(1);
  if(!hash) nav('home');
  else {
    const [page, arg] = hash.split('=');
    handleRoute({page, arg: decodeURIComponent(arg||'')});
  }
});
