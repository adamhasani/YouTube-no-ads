<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>YourTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--surface:#272727;--surface2:#3d3d3d;--border:#3d3d3d;--text:#f1f1f1;--text2:#aaa;--red:#ff0000;--blue:#3ea6ff;--nav-h:56px;--side-w:72px;--side-full:240px}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Roboto',Arial,sans-serif;font-size:14px;overflow-x:hidden;transition:background .3s,color .3s}
body.light{--bg:#fff;--surface:#f2f2f2;--surface2:#e5e5e5;--border:#ddd;--text:#0f0f0f;--text2:#606060}
a{color:inherit;text-decoration:none}
button{background:none;border:none;cursor:pointer;color:inherit;font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#606060;border-radius:3px}

/* NAV */
#navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--bg);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:300;border-bottom:1px solid var(--border);transition:background .3s}
#logo-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative}
.icon-btn:hover{background:var(--surface)}
.icon-btn svg{width:22px;height:22px}
#logo-svg{cursor:pointer;display:flex;align-items:center;gap:6px}
.logo-txt{font-size:18px;font-weight:700;letter-spacing:-.5px}

/* SEARCH */
#search-wrap{flex:1;max-width:600px;margin:0 auto;position:relative}
#search-form{display:flex;position:relative}
#search-input{flex:1;padding:9px 16px;background:#121212;color:var(--text);border:1px solid var(--border);border-right:none;border-radius:40px 0 0 40px;outline:none;font-size:15px}
body.light #search-input{background:#f8f8f8}
#search-input:focus{border-color:var(--blue)}
#search-btn{width:56px;background:var(--surface);border:1px solid var(--border);border-radius:0 40px 40px 0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#search-btn:hover{background:var(--surface2)}
#suggest-box{position:absolute;top:calc(100% + 4px);left:0;right:56px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;z-index:400;display:none;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.sug-item{padding:10px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;font-size:14px;color:var(--text)}
.sug-item:hover{background:var(--surface2)}
.sug-item svg{flex-shrink:0;opacity:.5;width:18px;height:18px}

/* NAV RIGHT */
#nav-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.badge{position:absolute;top:3px;right:3px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:999px;display:flex;align-items:center;justify-content:center}

/* SIDEBAR */
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:290}
#sb-overlay.show{display:block}
#sidebar{position:fixed;top:var(--nav-h);left:0;bottom:0;width:var(--side-w);background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:8px 0;z-index:295;overflow-y:auto;overflow-x:hidden;transition:width .2s,transform .2s,background .3s;scrollbar-width:none}
#sidebar.exp{width:var(--side-full);align-items:flex-start}
#sidebar::-webkit-scrollbar{display:none}
.si{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 0;width:100%;cursor:pointer;border-radius:10px;font-size:10px;color:var(--text2);transition:background .1s}
.si:hover,.si.on{background:var(--surface);color:var(--text)}
.si svg{width:22px;height:22px;flex-shrink:0}
#sidebar.exp .si{flex-direction:row;padding:10px 16px;gap:20px;font-size:14px}
#sidebar.exp .si.on{font-weight:600}
.sdiv{width:40px;height:1px;background:var(--border);margin:6px 0;flex-shrink:0}
#sidebar.exp .sdiv{width:calc(100% - 32px);margin:6px 16px}
.slabel{display:none;font-size:14px;font-weight:600;padding:8px 16px;width:100%}
#sidebar.exp .slabel{display:block}

/* MAIN */
#main{margin-top:var(--nav-h);margin-left:var(--side-w);transition:margin-left .2s;min-height:calc(100vh - var(--nav-h))}
#main.exp{margin-left:var(--side-full)}
.page{display:none}
.page-pad{padding:16px 20px 60px;max-width:1800px;margin:0 auto}

/* PLAYER WRAPPER */
#player-wrapper{display:none;background:#000;position:relative}
#pw-inner{position:relative;width:100%;height:100%}
#yt-player{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
#audio-overlay{position:absolute;inset:0;background:#111;z-index:15;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer}

/* WATCH GRID LAYOUT */
body.is-watch #main{display:grid;grid-template-columns:minmax(0,1fr) 380px;grid-template-areas:"player related""details related";gap:24px;padding:16px 24px;max-width:1800px;margin:var(--nav-h) auto 0 var(--side-w)}
body.is-watch #main.exp{margin-left:var(--side-full)}
body.is-watch #player-wrapper{grid-area:player;display:block!important;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden}
body.is-watch #watch-page{display:contents}
body.is-watch #w-details{grid-area:details}
body.is-watch #w-related{grid-area:related}

/* PLAYER CONTROLS */
#pctrl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:8px 12px 12px;display:flex;align-items:center;gap:6px;opacity:0;transition:opacity .2s;z-index:20;flex-wrap:wrap;pointer-events:none}
#player-wrapper:hover #pctrl{opacity:1}
#pctrl>*{pointer-events:auto}
.pb{background:none;border:none;color:#fff;cursor:pointer;padding:6px;border-radius:5px;display:flex;align-items:center}
.pb:hover{background:rgba(255,255,255,.2)}
.pb svg{width:22px;height:22px}
.psel{background:rgba(0,0,0,.65);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:4px 8px;font-size:13px;cursor:pointer;font-family:inherit}
.psp{flex:1}

/* MINI PLAYER */
body.is-mini #player-wrapper{display:flex!important;position:fixed;bottom:20px;right:20px;width:320px;height:auto;z-index:999;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.8);overflow:hidden;flex-direction:column}
body.is-mini #pw-inner{width:100%;aspect-ratio:16/9}
body.is-mini #pctrl{display:none!important}
#mini-ui{display:none;align-items:center;gap:8px;padding:8px 10px;background:#1a1a1a;border-top:1px solid #333}
body.is-mini #mini-ui{display:flex}
#mini-title{font-size:13px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.mini-btn{background:none;border:none;color:#fff;padding:6px;cursor:pointer;display:flex;align-items:center}
.mini-btn svg{width:22px;height:22px}

/* CATS */
#cats{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--nav-h);background:var(--bg);z-index:50;transition:background .3s}
#cats::-webkit-scrollbar{display:none}
.cpill{flex-shrink:0;padding:7px 14px;border-radius:8px;background:var(--surface);color:var(--text);border:none;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap}
.cpill:hover{background:var(--surface2)}
.cpill.on{background:var(--text);color:var(--bg)}

/* PERSONALIZATION BANNER */
#pbanner{display:none;margin:8px 20px;padding:10px 16px;background:linear-gradient(135deg,#1a1a3e,#2d1b4e);border-radius:10px;align-items:center;gap:10px;font-size:13px;color:#c9b8ff}

/* RSS BADGE */
.rss-badge{display:inline-flex;align-items:center;gap:4px;background:#ff6600;color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:8px;vertical-align:middle}

/* GRID */
#grid,#sq-grid,#hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:8px 20px 40px}

/* VIDEO CARD */
.vc{cursor:pointer}
.vt{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:#000}
.vt img{width:100%;height:100%;object-fit:cover;transition:transform .25s;display:block}
.vc:hover .vt img{transform:scale(1.04)}
.vdur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:12px;font-weight:600;padding:2px 6px;border-radius:4px}
.vsavebtn{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.8);color:#fff;border-radius:4px;padding:5px 10px;font-size:12px;font-weight:500;display:none;align-items:center;gap:4px;border:none;cursor:pointer}
.vt:hover .vsavebtn{display:flex}
.vmi{display:flex;gap:10px;margin-top:10px;align-items:flex-start}
.vav{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;cursor:pointer}
.vav img{width:100%;height:100%;object-fit:cover}
.vnm{font-size:14px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vch{font-size:13px;color:var(--text2);margin-top:2px}
.vst{font-size:13px;color:var(--text2)}

/* SKELETON */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}

/* WATCH DETAILS */
#vtitle{font-size:20px;font-weight:700;margin:0 0 10px;line-height:1.4}
#lbar-wrap{display:none;margin-bottom:12px}
#lbar-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px}
#lbar{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
#lbar-fill{height:100%;background:var(--blue);transition:width .5s}
#vmeta{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px}
#chinfo{display:flex;align-items:center;gap:10px;flex:1;min-width:200px;cursor:pointer;padding:4px;border-radius:8px}
#chinfo:hover{background:var(--surface)}
#chavatar{width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
#chavatar img{width:100%;height:100%;object-fit:cover}
#subbtn{padding:10px 18px;background:var(--text);color:var(--bg);border-radius:99px;font-weight:600;font-size:14px;flex-shrink:0}
#abtns{display:flex;gap:8px;flex-wrap:wrap}
.ab{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:99px;background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.ab:hover,.ab.on{background:var(--surface2)}
.ab svg{width:18px;height:18px}
#dbox{background:var(--surface);border-radius:12px;padding:14px;margin-top:10px;transition:background .3s}
#dtxt{font-size:14px;line-height:1.6;white-space:pre-wrap;max-height:80px;overflow:hidden}
#dtxt.exp{max-height:none}

/* NOTES */
#notesec{display:none;margin-top:10px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
#notehdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);cursor:pointer;font-weight:600;font-size:14px}
#notearea{width:100%;min-height:90px;background:var(--bg);color:var(--text);border:none;padding:12px;font-family:inherit;font-size:14px;resize:vertical;outline:none;display:none;transition:background .3s,color .3s}

/* RELATED */
.rcard{display:flex;gap:8px;margin-bottom:10px;cursor:pointer;padding:5px;border-radius:8px}
.rcard:hover{background:var(--surface)}
.rthumb{position:relative;flex-shrink:0;width:168px;height:94px;border-radius:8px;overflow:hidden;background:#000}
.rthumb img{width:100%;height:100%;object-fit:cover;display:block}
.rdur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;font-weight:600;padding:1px 5px;border-radius:3px}
.rtitle{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rch{font-size:12px;color:var(--text2);margin-top:2px}

/* PLAYLIST PANEL */
#pl-panel{position:fixed;top:var(--nav-h);right:-380px;width:360px;bottom:0;background:var(--bg);border-left:1px solid var(--border);z-index:250;transition:right .2s,background .3s;display:flex;flex-direction:column}
#pl-panel.open{right:0}
.pl-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pl-sel{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:8px;outline:none;font-size:14px;font-weight:600;cursor:pointer}
#wl-list{flex:1;overflow-y:auto;padding:12px}
.wlitem{display:flex;gap:10px;margin-bottom:10px;cursor:pointer;padding:8px;border-radius:8px}
.wlitem:hover{background:var(--surface)}
.wlthumb{width:110px;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#000;flex-shrink:0}
.wlthumb img{width:100%;height:100%;object-fit:cover}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center;padding:16px}
.moverlay.show{display:flex}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:420px;width:100%}
.mbox h2{font-size:18px;margin-bottom:14px}
.minput{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
.minput:focus{border-color:var(--blue)}
.mbtn{padding:10px 20px;background:var(--blue);color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#222;color:#fff;padding:10px 22px;border-radius:99px;font-size:14px;font-weight:500;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none;border:1px solid #444}
#toast.show{transform:translateX(-50%) translateY(0)}

/* SPINNER */
#spinner{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.sring{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:80px 20px;color:var(--text2);grid-column:1/-1}

/* RESPONSIVE */
@media(max-width:800px){
  body.is-watch #main{display:flex;flex-direction:column;padding:0;gap:0;margin-left:0!important}
  body.is-watch #player-wrapper{border-radius:0;order:1}
  body.is-watch #watch-page{order:2;display:flex;flex-direction:column}
  body.is-watch #w-details{padding:16px}
  body.is-watch #w-related{padding:16px}
}
@media(max-width:640px){
  #navbar{padding:0 8px;gap:6px}
  .logo-txt{display:none}
  #main{margin-left:0!important}
  #grid,#sq-grid,#hist-grid{grid-template-columns:1fr;padding:8px 0 40px}
  .vt{border-radius:0}
  .vmi{padding:0 12px}
  #sidebar{transform:translateX(-100%);width:260px;box-shadow:none}
  #sidebar.exp{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.6)}
  #sidebar .si{flex-direction:row;padding:14px 20px;gap:20px;font-size:15px}
  #sidebar .slabel{display:block;padding:12px 20px}
  #sidebar .sdiv{width:calc(100% - 40px);margin:8px 20px}
  body.is-mini #player-wrapper{bottom:0;right:0;width:100%;border-radius:0;flex-direction:row;box-shadow:none;height:60px}
  body.is-mini #pw-inner{width:106px;height:100%;flex:none;aspect-ratio:unset}
  body.is-mini #mini-ui{flex:1;border:none;padding:0 8px}
  #pl-panel{width:100%;right:-100%;z-index:400}
}
</style>
</head>
<body>

<nav id="navbar">
  <div id="logo-wrap">
    <button class="icon-btn" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <div id="logo-svg" onclick="nav('home')">
      <svg height="22" viewBox="0 0 30 22">
        <path d="M29.4 3.4C29.1 2.3 28.2 1.4 27.1 1.1 24.8 0.5 15 0.5 15 0.5S5.2 0.5 2.9 1.1C1.8 1.4.9 2.3.6 3.4 0 5.7 0 10.5 0 10.5s0 4.8.6 7.1c.3 1.1 1.2 2 2.3 2.3C5.2 20.5 15 20.5 15 20.5s9.8 0 12.1-.6c1.1-.3 2-1.2 2.3-2.3.6-2.3.6-7.1.6-7.1s0-4.8-.6-7.1z" fill="#FF0000"/>
        <path d="M12 15l8-4.5L12 6v9z" fill="white"/>
      </svg>
      <span class="logo-txt">YourTube</span>
    </div>
  </div>

  <div id="search-wrap">
    <form id="search-form" onsubmit="doSearch(event)" autocomplete="off">
      <input id="search-input" type="text" placeholder="Cari video..." oninput="onSugInput(this.value)" onfocus="onSugFocus()" onblur="onSugBlur()"/>
      <button id="search-btn" type="submit">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#aaa"><path d="M20.87 20.17l-5.59-5.59C16.35 13.35 17 11.75 17 10c0-3.87-3.13-7-7-7s-7 3.13-7 7 3.13 7 7 7c1.75 0 3.35-.65 4.58-1.71l5.59 5.59.7-.71zM10 16c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
      </button>
    </form>
    <div id="suggest-box"></div>
  </div>

  <div id="nav-right">
    <button class="icon-btn" onclick="togglePLPanel()" title="Koleksi">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
    </button>
    <button class="icon-btn" onclick="toggleTheme()" title="Ganti Tema">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>
  </div>
</nav>

<div id="sb-overlay" onclick="toggleSidebar()"></div>

<aside id="sidebar">
  <div class="si on" id="sb-home" onclick="nav('home')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Beranda</span>
  </div>
  <div class="si" onclick="nav('search','shorts viral')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.77 10.32l-1.2-.5L18 9l.5-1.2.5 1.2 1.2.5-1.2.5L18 11.2l-.23-.88zM3 9l2.93 7h1.76l1.44-3.39L10.56 16h1.76L15.26 9h-1.7l-1.45 3.48L10.56 9H8.81l-1.45 3.48L5.91 9H3z"/></svg><span>Shorts</span>
  </div>
  <div class="si" id="sb-history" onclick="nav('history')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg><span>Riwayat</span>
  </div>
  <div class="si" onclick="openPLPanel()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg><span>Koleksi</span>
  </div>
  <div class="sdiv"></div>
  <div class="slabel">Jelajahi</div>
  <div class="si" onclick="loadCat('')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.2 10H14L17 3H11v8H8l6.8 9z"/></svg><span>Trending</span>

<script>
// ═══════════════════════════════════════════════
// CORE — semua request ke /api/youtube (proxy)
// ═══════════════════════════════════════════════
async function api(endpoint, params, useCache = true) {
  const cacheKey = 'ytc_' + endpoint + '_' + JSON.stringify(params);
  if (useCache) {
    const hit = sessionStorage.getItem(cacheKey);
    if (hit) return JSON.parse(hit);
  }
  try {
    const qs = new URLSearchParams({ endpoint, ...params });
    const r = await fetch('/api/youtube?' + qs);
    const d = await r.json();
    if (d.error) { console.error('API error:', d.error.message); return null; }
    if (useCache) sessionStorage.setItem(cacheKey, JSON.stringify(d));
    return d;
  } catch(e) { console.error(e); return null; }
}

// ═══════════════════════════════════════════════
// RSS FEED — GRATIS
// ═══════════════════════════════════════════════
async function rssChannel(channelId, max = 12) {
  try {
    const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const r = await fetch(proxy);
    const json = await r.json();
    if (!json.contents) return [];
    const parser = new DOMParser();
    const xml = parser.parseFromString(json.contents, 'text/xml');
    const entries = [...xml.querySelectorAll('entry')].slice(0, max);
    return entries.map(e => {
      const vidId = e.querySelector('videoId')?.textContent || '';
      const title = e.querySelector('title')?.textContent || '';
      const published = e.querySelector('published')?.textContent || '';
      const views = e.querySelector('statistics')?.getAttribute('views') || '0';
      const thumb = `https://i.ytimg.com/vi/${vidId}/hqdefault.jpg`;
      const chName = e.querySelector('author name')?.textContent || '';
      return {
        id: vidId,
        snippet: {
          title, publishedAt: published,
          channelTitle: chName, channelId,
          thumbnails: { high: { url: thumb }, medium: { url: thumb } }
        },
        statistics: { viewCount: views },
        contentDetails: {}
      };
    }).filter(v => v.id);
  } catch(e) { return []; }
}

function ytThumb(id, q = 'hqdefault') {
  return `https://i.ytimg.com/vi/${id}/${q}.jpg`;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let sideExp = window.innerWidth > 1024;
let curCat = '';
let curVidId = null;
let curVidData = null;
let ytP = null, ytReady = false, pendVid = null;
let autoRep = false, curSpd = 1, audioMode = false;
let sugTimer = null, ttTimer = null;
let avCache = {};
let wHist = JSON.parse(localStorage.getItem('yt_hist') || '[]');
let sHist = JSON.parse(localStorage.getItem('yt_shist') || '[]');
let playlists = JSON.parse(localStorage.getItem('yt_playlists') || '{"Tonton Nanti":[]}');
let curPlView = 'Tonton Nanti';

const AVC = ['#e53935','#8e24aa','#1e88e5','#00897b','#f4511e','#6d4c41','#546e7a','#43a047','#fb8c00','#d81b60'];
function avc(s){let h=0;for(let c of(s||''))h=(h*31+c.charCodeAt(0))&0xffffffff;return AVC[Math.abs(h)%AVC.length];}
function fv(n){if(!n)return'0';n=parseInt(n);if(n>=1e9)return(n/1e9).toFixed(1)+'M';if(n>=1e6)return(n/1e6).toFixed(1)+'jt';if(n>=1e3)return(n/1e3).toFixed(0)+'rb';return n.toString();}
function fvl(n){if(!n)return'0';n=parseInt(n);return n.toLocaleString('id');}
function ago(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'baru saja';const m=Math.floor(s/60);if(m<60)return m+'m lalu';const h=Math.floor(m/60);if(h<24)return h+' jam lalu';const dy=Math.floor(h/24);if(dy<7)return dy+' hari lalu';const w=Math.floor(dy/7);if(w<5)return w+' minggu lalu';const mo=Math.floor(dy/30);if(mo<12)return mo+' bulan lalu';return Math.floor(dy/365)+' tahun lalu';}
function dur(d){if(!d)return'';const m=d.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);if(!m)return'';const h=parseInt(m[1]||0),mn=parseInt(m[2]||0),s=parseInt(m[3]||0);if(h>0)return`${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`;return`${mn}:${String(s).padStart(2,'0')}`;}
function esc(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function G(id){return document.getElementById(id);}
function toast(msg,ms=3000){const t=G('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}
function spin(v){G('spinner').style.display=v?'flex':'none';}

// ═══════════════════════════════════════════════
// YT PLAYER (Dengan Paksaan Region Indo/Dubbing)
// ═══════════════════════════════════════════════
window.onYouTubeIframeAPIReady = function(){ ytReady=true; if(pendVid){loadP(pendVid);pendVid=null;} };
function loadP(vid) {
  const saved = localStorage.getItem('ytt_' + vid);
  if (ytP) { ytP.loadVideoById(vid, saved ? parseFloat(saved) : 0); return; }
  ytP = new YT.Player('yt-player', {
    host: 'https://www.youtube.com', 
    videoId: vid,
    playerVars: { 
        autoplay:1, 
        rel:0, 
        modestbranding:1, 
        playsinline:1, 
        enablejsapi:1,
        hl: 'id',             // Paksa UI dan Dubbing ke bahasa Indonesia
        cc_lang_pref: 'id'    // Paksa Subtitle (CC) default ke Indonesia
    },
    events: {
      onReady(e) { e.target.setPlaybackRate(curSpd); if(saved) e.target.seekTo(parseFloat(saved)); },
      onStateChange(e) {
        if (e.data === YT.PlayerState.ENDED && autoRep) ytP.seekTo(0);
        if (e.data === YT.PlayerState.PLAYING) {
          ttTimer = setInterval(() => { if(ytP?.getCurrentTime && curVidId) localStorage.setItem('ytt_'+curVidId, ytP.getCurrentTime()); }, 4000);
        } else { clearInterval(ttTimer); }
      }
    }
  });
}
function yc(cmd){if(ytP&&ytP[cmd])ytP[cmd]();}
function setSpd(v){curSpd=parseFloat(v);if(ytP)ytP.setPlaybackRate(curSpd);}
function setCap(l){try{if(!l)ytP.unloadModule('captions');else{ytP.loadModule('captions');ytP.setOption('captions','track',{languageCode:l});}}catch(e){}}
function toggleAudioMode(){audioMode=!audioMode;const ov=G('audio-overlay');ov.style.display=audioMode?'flex':'none';toast(audioMode?'🎧 Mode Audio Aktif — Hemat Data':'Mode audio OFF');}
function closeMini(){if(ytP?.pauseVideo)ytP.pauseVideo();document.body.classList.remove('is-mini');curVidId=null;}
async function goFS(){
  const el=G('player-wrapper');
  try{
    if(el.requestFullscreen)await el.requestFullscreen();
    else if(el.webkitRequestFullscreen)await el.webkitRequestFullscreen();
    setTimeout(async()=>{try{await screen.orientation.lock('landscape');toast('📱 Auto landscape!');}catch(e){}},200);
  }catch(e){}
}
function toggleRep(){autoRep=!autoRep;G('rep-btn').style.background=autoRep?'rgba(255,0,0,.35)':'';toast(autoRep?'🔁 Putar Ulang ON':'Putar Ulang OFF');}

// ═══════════════════════════════════════════════
// SPA ROUTER
// ═══════════════════════════════════════════════
function nav(page, arg) {
  if(history.state?.page===page && history.state?.arg===arg) return;
  history.pushState({page,arg},'',`#${page}${arg?'='+encodeURIComponent(arg):''}`);
  applyRoute({page,arg});
}
window.addEventListener('popstate', e => applyRoute(e.state||{page:'home'}));

function applyRoute(state) {
  if(window.innerWidth<=640 && G('sidebar').classList.contains('exp')) toggleSidebar();
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  window.scrollTo(0,0);
  const page=state.page||'home', pgEl=G(page+'-page');
  if(pgEl) pgEl.style.display='block';

  if(page==='watch'){
    document.body.classList.add('is-watch'); document.body.classList.remove('is-mini');
    if(curVidId!==state.arg) openWatch(state.arg);
  } else {
    document.body.classList.remove('is-watch');
    if(curVidId) document.body.classList.add('is-mini');
    else document.body.classList.remove('is-mini');
    if(page==='home') showHome();
    if(page==='channel') openChannel(state.arg);
    if(page==='search') doSearchTerm(state.arg, true);
    if(page==='history') showHistory();
  }
  document.querySelectorAll('.si').forEach(el=>el.classList.remove('on'));
  const an=G('sb-'+page); if(an) an.classList.add('on');
}

// ═══════════════════════════════════════════════
// HISTORY & SEARCH SUGGESTIONS
// ═══════════════════════════════════════════════
function addHist(v){
  const id=v.id?.videoId||v.id; wHist=wHist.filter(x=>x.id!==id);
  wHist.unshift({id,title:v.snippet?.title,ch:v.snippet?.channelTitle,chId:v.snippet?.channelId,thumb:v.snippet?.thumbnails?.medium?.url||ytThumb(id,'mqdefault'),ts:Date.now()});
  wHist=wHist.slice(0,60); localStorage.setItem('yt_hist',JSON.stringify(wHist));
}
function showHistory(){
  const g=G('hist-grid');
  if(!wHist.length){g.innerHTML='<div class="empty">Belum ada riwayat tontonan</div>';return;}
  g.innerHTML=wHist.map(v=>cardH({id:v.id,snippet:{title:v.title,channelTitle:v.ch,channelId:v.chId,thumbnails:{medium:{url:v.thumb}}}})).join('');
}
function addSHist(q){sHist=sHist.filter(x=>x!==q);sHist.unshift(q);localStorage.setItem('yt_shist',JSON.stringify(sHist.slice(0,12)));}

function onSugInput(v){clearTimeout(sugTimer);if(!v||v.length<2){showRecentSearch();return;}sugTimer=setTimeout(()=>fetchSug(v),300);}
function onSugFocus(){const v=G('search-input').value.trim();if(v.length>=2)fetchSug(v);else showRecentSearch();}
function onSugBlur(){setTimeout(hideSug,200);}
function showRecentSearch(){
  if(!sHist.length){hideSug();return;}
  G('suggest-box').innerHTML='<div style="padding:8px 16px;font-size:12px;color:var(--text2);font-weight:600">PENCARIAN TERAKHIR</div>'+sHist.map(s=>`<div class="sug-item" onmousedown="pickSug('${esc(s)}')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>${esc(s)}</div>`).join('');
  G('suggest-box').style.display='block';
}
function fetchSug(q){
  const cb='_yts_'+Date.now(); const s=document.createElement('script');
  const t=setTimeout(()=>{hideSug();try{delete window[cb];s.remove();}catch(e){}},3000);
  window[cb]=data=>{clearTimeout(t);try{delete window[cb];s.remove();}catch(e){}renderSug(data[1]?data[1].map(x=>Array.isArray(x)?x[0]:x):[]);};
  s.src=`https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&hl=id&q=${encodeURIComponent(q)}&callback=${cb}`;
  document.head.appendChild(s);
}
function renderSug(items){
  if(!items.length)return;
  G('suggest-box').innerHTML=items.slice(0,8).map(s=>`<div class="sug-item" onmousedown="pickSug('${esc(s)}')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>${esc(s)}</div>`).join('');
  G('suggest-box').style.display='block';
}
function hideSug(){G('suggest-box').style.display='none';}
function pickSug(s){G('search-input').value=s;hideSug();nav('search',s);}
function doSearch(e){e.preventDefault();const q=G('search-input').value.trim();if(q)nav('search',q);}

// ═══════════════════════════════════════════════
// AVATAR FETCH (CACHED)
// ═══════════════════════════════════════════════
async function fetchAv(ids){
  const miss=[...new Set(ids)].filter(id=>!avCache[id]&&id);
  if(!miss.length)return;
  for(let i=0;i<miss.length;i+=50){
    const d=await api('channels',{part:'snippet',id:miss.slice(i,i+50).join(','),maxResults:50});
    if(d?.items)d.items.forEach(ch=>{avCache[ch.id]=ch.snippet?.thumbnails?.default?.url||'';});
  }
}

// ═══════════════════════════════════════════════
// CARDS
// ═══════════════════════════════════════════════
function cardH(v, horiz=false){
  const id=v.id?.videoId||v.id;
  const sn=v.snippet||{},st=v.statistics||{},cd=v.contentDetails||{};
  const th=sn.thumbnails?.high?.url||sn.thumbnails?.medium?.url||ytThumb(id);
  const d=dur(cd.duration),views=fv(st.viewCount),ta=sn.publishedAt?ago(sn.publishedAt):'';
  const title=esc(sn.title||''),ch=esc(sn.channelTitle||''),chId=sn.channelId||'';
  const avU=avCache[chId]||'',avC=avc(ch);
  const avH=avU?`<img src="${avU}" loading="lazy" onerror="this.style.display='none'"/>`:((ch||'?')[0].toUpperCase());

  if(horiz)return`<div class="rcard" onclick="nav('watch','${id}')">
    <div class="rthumb"><img src="${th}" loading="lazy" onerror="this.src='${ytThumb(id,'mqdefault')}'" /><span class="rdur">${d}</span></div>
    <div style="flex:1;min-width:0"><div class="rtitle">${title}</div><div class="rch">${ch}</div><div class="rch">${ta}</div></div>
  </div>`;

  return`<div class="vc">
    <div class="vt" onclick="nav('watch','${id}')">
      <img src="${th}" loading="lazy" onerror="this.src='${ytThumb(id,'mqdefault')}'"/><span class="vdur">${d}</span>
      <button class="vsavebtn" onclick="event.stopPropagation();openSaveModal('${id}','${title.replace(/'/g,"\\'")}','${ch.replace(/'/g,"\\'")}','${th}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>Simpan
      </button>
    </div>
    <div class="vmi">
      <div class="vav" style="background:${avC}" onclick="event.stopPropagation();nav('channel','${chId}')">${avH}</div>
      <div style="flex:1;min-width:0;cursor:pointer" onclick="nav('watch','${id}')">
        <div class="vnm">${title}</div><div class="vch">${ch}</div>
        <div class="vst">${views?views+' penayangan':''}${ta?' · '+ta:''}</div>
      </div>
    </div>
  </div>`;
}
function skelC(){return`<div><div class="sk" style="width:100%;aspect-ratio:16/9;border-radius:12px"></div><div style="display:flex;gap:10px;margin-top:10px"><div class="sk" style="width:36px;height:36px;border-radius:50%;flex-shrink:0"></div><div style="flex:1"><div class="sk" style="height:13px;border-radius:4px;margin-bottom:7px;width:90%"></div><div class="sk" style="height:12px;border-radius:4px;width:60%"></div></div></div></div>`;}

// ═══════════════════════════════════════════════
// HOME + CATEGORIES
// ═══════════════════════════════════════════════
const CATS=[{id:'',l:'Semua'},{id:'10',l:'🎵 Musik'},{id:'20',l:'🎮 Gaming'},{id:'25',l:'📰 Berita'},{id:'17',l:'⚽ Olahraga'},{id:'28',l:'💻 Teknologi'},{id:'24',l:'🎭 Hiburan'},{id:'22',l:'👤 Vlog'},{id:'23',l:'😂 Komedi'},{id:'27',l:'📚 Edukasi'}];
function buildCats(){G('cats').innerHTML=CATS.map(c=>`<button class="cpill${c.id===curCat?' on':''}" onclick="loadCat('${c.id}')">${c.l}</button>`).join('');}

async function showHome(){
  buildCats();
  const terms=Object.entries(wHist.slice(0,20).reduce((a,v)=>{if(v.ch)a[v.ch]=(a[v.ch]||0)+1;return a;},{})).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);
  if(terms.length){
    G('pbanner').style.display='flex';
    G('pbtext').textContent=`Untukmu berdasarkan: ${terms.join(', ')}`;
    await loadPersonalized(terms);
  } else {
    G('pbanner').style.display='none';
    await loadCat('');
  }
}

async function loadPersonalized(terms){
  const g=G('grid'); g.innerHTML=Array(12).fill(0).map(skelC).join('');
  const qs=[...terms.map(t=>searchAPI(t,10)),getTrendAPI('',8)];
  const res=await Promise.all(qs);
  const seen=new Set(),merged=[];
  for(const b of res){for(const v of(b||[])){const id=v.id?.videoId||v.id;if(!seen.has(id)){seen.add(id);merged.push(v);}}}
  await fetchAv(merged.map(v=>v.snippet?.channelId).filter(Boolean));
  g.innerHTML=merged.map(v=>cardH(v)).join('')||'<div class="empty">Gagal memuat video</div>';
}

async function loadCat(c){
  curCat=c;buildCats();const g=G('grid');g.innerHTML=Array(12).fill(0).map(skelC).join('');
  const d=await getTrendAPI(c,24);
  if(!d){g.innerHTML='<div class="empty">Gagal memuat. Cek koneksi internet kamu.</div>';return;}
  await fetchAv(d.map(v=>v.snippet?.channelId).filter(Boolean));
  g.innerHTML=d.map(v=>cardH(v)).join('');
  G('pbanner').style.display='none';
}
async function getTrendAPI(c,m){const d=await api('videos',{part:'snippet,statistics,contentDetails',chart:'mostPopular',maxResults:m,regionCode:'ID',...(c?{videoCategoryId:c}:{})});return d?.items||null;}
async function searchAPI(q,m){
  const d=await api('search',{part:'snippet',q,type:'video',maxResults:m});
  if(!d?.items?.length)return[];
  const ids=d.items.map(x=>x.id.videoId).filter(Boolean).join(',');
  return(await api('videos',{part:'snippet,statistics,contentDetails',id:ids}))?.items||[];
}

async function doSearchTerm(q, isR){
  if(!isR)return nav('search',q);
  G('search-input').value=q; addSHist(q);
  G('sq-title').innerHTML=`Hasil untuk: <strong style="color:var(--text)">"${esc(q)}"</strong>`;
  const g=G('sq-grid'); g.innerHTML=Array(8).fill(0).map(skelC).join('');
  const items=await searchAPI(q,20);
  await fetchAv(items.map(v=>v.snippet?.channelId).filter(Boolean));
  g.innerHTML=items.length?items.map(v=>cardH(v)).join(''):'<div class="empty">Tidak ada hasil</div>';
}

// ═══════════════════════════════════════════════
// WATCH + RSS RELATED
// ═══════════════════════════════════════════════
async function openWatch(vid){
  curVidId=vid;
  G('vtitle').textContent='Memuat...'; G('dstats').textContent=''; G('dtxt').textContent='';
  G('dtxt').classList.remove('exp'); G('dtoggle').textContent='Lebih banyak';
  G('lbar-wrap').style.display='none'; G('notesec').style.display='none';
  G('chavatar').innerHTML=''; G('chname').textContent=''; G('chsubs').textContent='';
  G('mini-title').textContent=''; G('mini-ch').textContent='';
  G('rlist').innerHTML=Array(5).fill(0).map(()=>`<div style="display:flex;gap:8px;margin-bottom:10px"><div class="sk" style="width:168px;height:94px;border-radius:8px;flex-shrink:0"></div><div style="flex:1"><div class="sk" style="height:12px;border-radius:4px;margin-bottom:6px;width:90%"></div><div class="sk" style="height:11px;border-radius:4px;width:65%"></div></div></div>`).join('');

  if(ytReady) loadP(vid); else pendVid=vid;

  const d=await api('videos',{part:'snippet,statistics,contentDetails',id:vid});
  if(!d?.items?.length)return;
  const v=d.items[0]; curVidData=v;
  const sn=v.snippet||{}, st=v.statistics||{};

  document.title=`${sn.title||''} - YourTube`;
  G('vtitle').textContent=sn.title||'';
  G('dstats').textContent=`${fvl(st.viewCount)} penayangan · ${ago(sn.publishedAt)}`;
  G('dtxt').textContent=sn.description||'';
  G('mini-title').textContent=sn.title||'';
  G('mini-ch').textContent=sn.channelTitle||'';

  if(st.likeCount&&st.viewCount){
    const r=Math.min(100,(parseInt(st.likeCount)/parseInt(st.viewCount))*500);
    G('llike').textContent=`👍 ${fv(st.likeCount)} suka`;
    G('lratio').textContent=`Disukai ${r.toFixed(1)}% penonton`;
    G('lbar-fill').style.width=`${Math.min(100,r*2)}%`;
    G('lbar-wrap').style.display='block';
  }

  // Channel info
  const chId=sn.channelId;
  G('chname').textContent=sn.channelTitle||'';
  G('chinfo').dataset.chid=chId||'';
  if(chId){
    api('channels',{part:'snippet,statistics',id:chId}).then(cd=>{
      if(!cd?.items?.length)return;
      const c=cd.items[0];
      G('chsubs').textContent=`${fv(c.statistics?.subscriberCount||0)} subscriber`;
      const img=c.snippet?.thumbnails?.medium?.url||c.snippet?.thumbnails?.default?.url;
      if(img){G('chavatar').innerHTML=`<img src="${img}" alt=""/>`;avCache[chId]=img;}
      else{G('chavatar').textContent=(sn.channelTitle||'?')[0].toUpperCase();G('chavatar').style.background=avc(sn.channelTitle||'');}
    });
  }

  // Notes
  const notes=JSON.parse(localStorage.getItem('yt_notes')||'{}');
  G('notearea').value=notes[vid]||'';
  G('notearea').style.display='none';

  addHist(v);

  // RELATED — coba RSS dulu (gratis), fallback ke API
  G('rss-badge').style.display='none';
  if(chId){
    const rssVids = await rssChannel(chId, 12);
    const filtered = rssVids.filter(r=>r.id!==vid);
    if(filtered.length >= 3){
      G('rlist').innerHTML=filtered.map(r=>cardH(r,true)).join('');
      G('rss-badge').style.display='inline-flex';
      return;
    }
  }
  // Fallback ke API search
  const q=((sn.channelTitle||'')+' '+(sn.title||'').split(/\s+/).slice(0,3).join(' ')).trim();
  const rel=await searchAPI(q,12);
  await fetchAv(rel.map(r=>r.snippet?.channelId).filter(Boolean));
  G('rlist').innerHTML=rel.filter(r=>(r.id?.videoId||r.id)!==vid).map(r=>cardH(r,true)).join('');
}

// ═══════════════════════════════════════════════
// CHANNEL PAGE
// ═══════════════════════════════════════════════
async function openChannel(chId){
  if(!chId)return nav('home');
  G('ch-banner').innerHTML=''; G('ch-big-av').innerHTML='';
  G('ch-big-name').textContent='Memuat...'; G('ch-big-subs').textContent='';
  G('ch-grid').innerHTML=Array(8).fill(0).map(skelC).join('');

  const d=await api('channels',{part:'snippet,brandingSettings,statistics',id:chId});
  if(!d?.items?.length)return;
  const ch=d.items[0],sn=ch.snippet,st=ch.statistics,bs=ch.brandingSettings;
  if(bs?.image?.bannerExternalUrl)G('ch-banner').innerHTML=`<img src="${bs.image.bannerExternalUrl}" style="width:100%;height:100%;object-fit:cover"/>`;
  const hiAvUrl=sn?.thumbnails?.high?.url;
  if(hiAvUrl)G('ch-big-av').innerHTML=`<img src="${hiAvUrl}" style="width:100%;height:100%;object-fit:cover"/>`;
  else{G('ch-big-av').textContent=(sn?.title||'?')[0].toUpperCase();G('ch-big-av').style.background=avc(sn?.title||'');}
  G('ch-big-name').textContent=sn?.title||'';
  G('ch-big-subs').textContent=`${fv(st?.subscriberCount||0)} subscriber · ${fv(st?.videoCount||0)} video`;
  if(sn?.thumbnails?.default?.url) avCache[chId]=sn.thumbnails.default.url;

  // Coba RSS dulu (gratis!)
  const rssVids=await rssChannel(chId, 16);
  if(rssVids.length>=4){
    G('ch-grid').innerHTML=rssVids.map(v=>cardH(v)).join('');
    return;
  }
  // Fallback API
  const sv=await api('search',{part:'snippet',channelId:chId,order:'date',type:'video',maxResults:16});
  if(!sv?.items?.length){G('ch-grid').innerHTML='<div class="empty">Belum ada video</div>';return;}
  const vd=await api('videos',{part:'snippet,statistics,contentDetails',id:sv.items.map(i=>i.id.videoId).join(',')});
  G('ch-grid').innerHTML=vd?.items?.map(v=>cardH(v)).join('')||'';
}

// ═══════════════════════════════════════════════
// PLAYLIST
// ═══════════════════════════════════════════════
function openSaveModalCur(){if(curVidData)openSaveModal(curVidData.id,curVidData.snippet?.title||'',curVidData.snippet?.channelTitle||'',curVidData.snippet?.thumbnails?.medium?.url||ytThumb(curVidData.id));}
function openSaveModal(id,t,c,th){
  const m=G('pl-modal'); m.dataset.vid=id; m.dataset.vt=t; m.dataset.vc=c; m.dataset.vth=th;
  G('pl-list-modal').innerHTML=Object.keys(playlists).map(p=>`<label style="display:flex;align-items:center;gap:12px;margin-bottom:12px;cursor:pointer;font-size:15px"><input type="checkbox" style="width:18px;height:18px" ${playlists[p].some(v=>v.id===id)?'checked':''} onchange="togglePlItem('${p}','${id}','${esc(t)}','${esc(c)}','${th}',this.checked)">${esc(p)}</label>`).join('');
  m.classList.add('show');
}
function togglePlItem(p,id,t,c,th,chk){
  if(chk){if(!playlists[p].some(v=>v.id===id)){playlists[p].unshift({id,title:t,ch:c,thumb:th});toast(`✅ Disimpan ke "${p}"`);}}
  else{playlists[p]=playlists[p].filter(v=>v.id!==id);toast(`Dihapus dari "${p}"`);}
  localStorage.setItem('yt_playlists',JSON.stringify(playlists));
  if(G('pl-panel').classList.contains('open'))renderPL();
}
function createNewPl(){
  const n=G('new-pl-inp').value.trim(); if(!n||playlists[n])return;
  playlists[n]=[];G('new-pl-inp').value='';
  const m=G('pl-modal'); togglePlItem(n,m.dataset.vid,m.dataset.vt,m.dataset.vc,m.dataset.vth,true);
  openSaveModal(m.dataset.vid,m.dataset.vt,m.dataset.vc,m.dataset.vth);
}
function renderPL(){
  G('pl-select').innerHTML=Object.keys(playlists).map(p=>`<option value="${p}" ${p===curPlView?'selected':''}>${esc(p)}</option>`).join('');
  const items=playlists[curPlView]||[];
  G('wl-list').innerHTML=items.length?items.map(v=>`<div class="wlitem" onclick="nav('watch','${v.id}');closePLPanel()"><div class="wlthumb"><img src="${v.thumb||ytThumb(v.id,'mqdefault')}" loading="lazy"/></div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(v.title)}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">${esc(v.ch||'')}</div></div><button onclick="event.stopPropagation();playlists['${curPlView}']=playlists['${curPlView}'].filter(x=>x.id!=='${v.id}');localStorage.setItem('yt_playlists',JSON.stringify(playlists));renderPL()" style="width:28px;height:28px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;color:var(--text);flex-shrink:0">✕</button></div>`).join(''):'<div class="empty">Playlist kosong</div>';
}
function togglePLPanel(){G('pl-panel').classList.toggle('open');renderPL();}
function openPLPanel(){if(window.innerWidth<=640)toggleSidebar();G('pl-panel').classList.add('open');renderPL();}
function closePLPanel(){G('pl-panel').classList.remove('open');}
function bgClose(e,id){if(e.target===G(id))G(id).classList.remove('show');}

// ═══════════════════════════════════════════════
// MISC
// ═══════════════════════════════════════════════
function toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('yt_theme',document.body.classList.contains('light')?'light':'dark');}
function toggleSidebar(){
  const sb=G('sidebar'),mn=G('main'),ov=G('sb-overlay');
  if(window.innerWidth<=640){sb.classList.toggle('exp');ov.classList.toggle('show',sb.classList.contains('exp'));}
  else{sideExp=!sideExp;sb.classList.toggle('exp',sideExp);mn.classList.toggle('exp',sideExp);}
}
function toggleDesc(){const e=G('dtxt').classList.toggle('exp');G('dtoggle').textContent=e?'Lebih sedikit':'Lebih banyak';}
function toggleNotes(){const ns=G('notesec');ns.style.display=ns.style.display==='block'?'none':'block';}
function saveNote(){
  if(!curVidId)return;
  const n=JSON.parse(localStorage.getItem('yt_notes')||'{}');n[curVidId]=G('notearea').value;
  localStorage.setItem('yt_notes',JSON.stringify(n));
}
function shareVid(){
  const u=`https://youtu.be/${curVidId}`;
  if(navigator.share)navigator.share({title:G('vtitle').textContent,url:u});
  else if(navigator.clipboard)navigator.clipboard.writeText(u).then(()=>toast('🔗 Link disalin!'));
  else toast(u);
}

// FS landscape
document.addEventListener('fullscreenchange',async()=>{
  if(document.fullscreenElement){try{await screen.orientation.lock('landscape');}catch(e){}}
  else{try{screen.orientation.unlock();}catch(e){}}
});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('yt_theme')==='light')document.body.classList.add('light');
  if(sideExp&&window.innerWidth>640){G('sidebar').classList.add('exp');G('main').classList.add('exp');}
  if(!history.state)history.replaceState({page:'home'},'',window.location.pathname);
  const hash=window.location.hash.substring(1);
  if(hash){const[page,...rest]=hash.split('=');applyRoute({page,arg:decodeURIComponent(rest.join('='))});}
  else applyRoute({page:'home'});
});
